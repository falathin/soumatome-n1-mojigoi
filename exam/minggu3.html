<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N1 Simulator - Minggu 3</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Warna Merah Khas JLPT */
            --jlpt-red: #e60012;
            --jlpt-red-dark: #b3000e;
            --jlpt-red-light: #ffe5e6;
            --transition-speed: 0.3s;
        }

        body {
            /* Motif Jepang Halus di Background */
            background-color: #f4f6f9;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e60012' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            transition: background-color var(--transition-speed), color var(--transition-speed);
            font-family: 'Noto Sans JP', 'Segoe UI', Tahoma, sans-serif;
        }

        /* Override Bootstrap Primary Color dengan JLPT Red */
        .text-primary { color: var(--jlpt-red) !important; }
        .bg-primary { background-color: var(--jlpt-red) !important; }
        .border-primary { border-color: var(--jlpt-red) !important; }
        
        .btn-primary {
            background-color: var(--jlpt-red);
            border-color: var(--jlpt-red);
            color: white;
            box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
        }
        .btn-primary:hover {
            background-color: var(--jlpt-red-dark);
            border-color: var(--jlpt-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(230, 0, 18, 0.4);
        }
        
        .btn-outline-primary {
            color: var(--jlpt-red);
            border-color: var(--jlpt-red);
        }
        .btn-outline-primary:hover {
            background-color: var(--jlpt-red);
            color: white;
        }

        /* Styling Kartu */
        .card-exam {
            border: none;
            border-radius: 16px;
            border-top: 6px solid var(--jlpt-red);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
        }

        [data-bs-theme="dark"] body {
            background-color: #121212;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        [data-bs-theme="dark"] .card-exam {
            background-color: #1e1e1e;
            border-top: 6px solid var(--jlpt-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Tombol Opsi Jawaban */
        .btn-option {
            border-radius: 12px;
            border-width: 2px;
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
            font-size: 1.05rem;
            color: inherit;
            background-color: transparent;
            border-color: #dee2e6;
        }

        [data-bs-theme="dark"] .btn-option { border-color: #444; color: #f8f9fa; }

        .btn-option:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--jlpt-red);
            background-color: var(--jlpt-red-light);
            color: #333;
        }
        [data-bs-theme="dark"] .btn-option:hover:not(:disabled) {
            background-color: rgba(230, 0, 18, 0.2);
            color: #fff;
        }

        /* Kustomisasi Mode Terpilih (Mode Asli) */
        .btn-selected {
            background-color: var(--jlpt-red) !important;
            color: white !important;
            border-color: var(--jlpt-red) !important;
            box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
        }

        /* Nomor Opsi pada Tombol */
        .opt-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #e9ecef;
            color: #495057;
            font-weight: bold;
            margin-right: 12px;
            transition: all 0.3s ease;
        }
        [data-bs-theme="dark"] .opt-number { background-color: #333; color: #fff; }
        .btn-selected .opt-number, .btn-success .opt-number, .btn-danger .opt-number {
            background-color: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }

        /* Animasi Benar/Salah */
        @keyframes pulse-success {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.7); }
            50% { transform: scale(1.03); background-color: #198754; color: white; box-shadow: 0 0 0 10px rgba(25, 135, 84, 0); }
            100% { transform: scale(1); background-color: #198754; color: white; border-color: #198754; }
        }

        @keyframes shake-error {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
            50% { background-color: #dc3545; color: white; }
            100% { background-color: #dc3545; color: white; border-color: #dc3545; }
        }

        .animate-correct { animation: pulse-success 0.5s ease-out forwards; }
        .animate-wrong { animation: shake-error 0.5s ease-in-out forwards; }

        /* Timer Pulse */
        @keyframes pulse-danger {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .timer-warning { animation: pulse-danger 1s infinite; background-color: #dc3545 !important; }

        /* Theme Switcher Widget */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bs-body-bg);
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid var(--jlpt-red);
        }

        .btn-theme {
            border-radius: 50%;
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--bs-body-color);
            transition: all 0.3s;
        }

        .btn-theme.active {
            background: var(--jlpt-red);
            color: white;
            box-shadow: 0 2px 8px rgba(230, 0, 18, 0.4);
        }
        
        .explanation-box {
            border-left: 5px solid var(--jlpt-red);
            background-color: var(--jlpt-red-light);
            border-radius: 0 12px 12px 0;
            color: #333;
        }
        [data-bs-theme="dark"] .explanation-box {
            background-color: rgba(230, 0, 18, 0.1);
            color: #eee;
        }

        .explanation-list li { margin-bottom: 6px; }
        .soal-text { font-size: 1.25rem; font-weight: 700; color: inherit; }
        .badge-soal { background-color: var(--jlpt-red); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="theme-switcher d-flex gap-1">
        <button class="btn-theme" id="btn-theme-light" onclick="setTheme('light')" title="Light Mode">
            <i class="fas fa-sun"></i>
        </button>
        <button class="btn-theme" id="btn-theme-dark" onclick="setTheme('dark')" title="Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
        <button class="btn-theme" id="btn-theme-system" onclick="setTheme('system')" title="System Theme">
            <i class="fas fa-desktop"></i>
        </button>
    </div>

    <div class="container py-5" id="app">
        </div>

    <script>
        const hari3_data = [
            { id: 1, text: "うそをついているのがばれるのではないかと、（  ）した。", options: ["はらはら", "おどおど", "むかむか", "うんざり"], answer: 0, explanation: "Konteks: Merasa cemas/jantungan takut kebohongannya terbongkar.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. はらはら:</strong> Tepat. Merasa cemas/berdebar-debar karena tegang atau takut ketahuan (suspense).</li><li><strong>2. おどおど:</strong> Gugup/gelisah (tindakannya mencurigakan/takut).</li><li><strong>3. むかむか:</strong> Merasa mual atau kesal/marah.</li><li><strong>4. うんざり:</strong> Muak/bosan.</li></ul>" },
            { id: 2, text: "父は（  ）医者に忠告されているにもかかわらず、酒をやめようとしない。", options: ["不意に", "とっさに", "片時も", "再三"], answer: 3, explanation: "Konteks: Meskipun sudah diperingatkan berulang kali oleh dokter.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 不意に:</strong> Tiba-tiba / tanpa disangka.</li><li><strong>2. とっさに:</strong> Secara spontan / seketika.</li><li><strong>3. 片時も:</strong> Sedetik pun (biasanya diikuti bentuk negatif).</li><li><strong>4. 再三 (さいさん):</strong> Tepat. Berulang kali / berkali-kali.</li></ul>" },
            { id: 3, text: "衝突事故を起こした車は（  ）つぶれていた。", options: ["さんざん", "ぐちゃぐちゃに", "はなはだ", "ちょくちょく"], answer: 1, explanation: "Konteks: Mobil yang mengalami tabrakan hancur lebur.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. さんざん:</strong> Habis-habisan (dikritik, dimarahi, dll).</li><li><strong>2. ぐちゃぐちゃに:</strong> Tepat. Hancur berantakan / remuk.</li><li><strong>3. はなはだ:</strong> Sangat (biasanya untuk hal negatif yang ekstrem).</li><li><strong>4. ちょくちょく:</strong> Sering / kerap kali.</li></ul>" },
            { id: 4, text: "荷物は（  ）そこに置いておいてください。", options: ["とりあえず", "もっぱら", "ことごとく", "しょっちゅう"], answer: 0, explanation: "Konteks: Letakkan saja barangnya di situ untuk sementara waktu.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. とりあえず:</strong> Tepat. Untuk sementara waktu / yang penting (lakukan ini dulu).</li><li><strong>2. もっぱら:</strong> Sebagian besar / melulu.</li><li><strong>3. ことごとく:</strong> Semuanya / tanpa terkecuali.</li><li><strong>4. しょっちゅう:</strong> Sering sekali.</li></ul>" },
            { id: 5, text: "徹夜で作業して（  ）期限に間に合わせることができた。", options: ["もしかして", "かろうじて", "かえって", "わざわざ"], answer: 1, explanation: "Konteks: Nyaris saja/dengan susah payah bisa mengejar tenggat waktu berkat kerja semalaman.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. もしかして:</strong> Jangan-jangan / barangkali.</li><li><strong>2. かろうじて:</strong> Tepat. Dengan susah payah / nyaris tidak (barely).</li><li><strong>3. かえって:</strong> Malah / sebaliknya (dari yang diharapkan).</li><li><strong>4. わざわざ:</strong> Sengaja (melakukan sesuatu yang merepotkan).</li></ul>" },
            { id: 6, text: "ブランド品と見れば何でも買う彼女には（  ）愛想が尽きた。", options: ["むかむか", "ひたすら", "やたらと", "つくづく"], answer: 3, explanation: "Konteks: Saya benar-benar muak/hilang simpati kepadanya.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. むかむか:</strong> Mual / kesal.</li><li><strong>2. ひたすら:</strong> Dengan tekun / semata-mata.</li><li><strong>3. やたらと:</strong> Sembarangan / sangat berlebihan.</li><li><strong>4. つくづく:</strong> Tepat. Sangat/mendalam. (つくづく愛想が尽きる = benar-benar kehabisan simpati/muak).</li></ul>" },
            { id: 7, text: "赤ちゃんの肌は（  ）している。", options: ["まるまる", "ごしごし", "つやつや", "ぴんぴん"], answer: 2, explanation: "Konteks: Mendeskripsikan kulit bayi yang halus dan bercahaya.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. まるまる:</strong> Sepenuhnya / bulat-bulat (gemuk).</li><li><strong>2. ごしごし:</strong> (Menggosok) dengan kuat.</li><li><strong>3. つやつや:</strong> Tepat. Mulus, licin, dan bercahaya (glowing).</li><li><strong>4. ぴんぴん:</strong> Sehat walafiat (biasanya untuk orang tua).</li></ul>" },
            { id: 8, text: "注意しなくても（  ）間違いに気が付くだろう。", options: ["案の定", "いかにも", "おのずと", "あえて"], answer: 2, explanation: "Konteks: Walaupun tidak diperingatkan, dia akan menyadari kesalahannya dengan sendirinya.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 案の定 (あんのじょう):</strong> Seperti dugaan.</li><li><strong>2. いかにも:</strong> Memang benar-benar (seperti...).</li><li><strong>3. おのずと:</strong> Tepat. Dengan sendirinya / secara alami (自ずと).</li><li><strong>4. あえて:</strong> Dengan sengaja / memberanikan diri.</li></ul>" },
            { id: 9, text: "そろそろ失礼します。（  ）とおじゃましました。", options: ["点々", "転々", "着々", "長々"], answer: 3, explanation: "Konteks: Meminta maaf karena bertamu terlalu lama.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 点々 (てんてん):</strong> Bertebaran / menetes.</li><li><strong>2. 転々 (てんてん):</strong> Berpindah-pindah (pekerjaan/tempat tinggal).</li><li><strong>3. 着々 (ちゃくちゃく):</strong> Selangkah demi selangkah / dengan mantap.</li><li><strong>4. 長々 (ながなが):</strong> Tepat. Berlama-lama. (長々とおじゃましました = maaf saya mengganggu terlalu lama).</li></ul>" },
            { id: 10, text: "最近、昼食は（  ）隣のラーメン屋で済ませています。", options: ["ひたすら", "もろに", "ひょっとして", "もっぱら"], answer: 3, explanation: "Konteks: Akhir-akhir ini, makan siang hampir selalu (melulu) di kedai ramen sebelah.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. ひたすら:</strong> Semata-mata / fokus hanya pada satu hal.</li><li><strong>2. もろに:</strong> Secara langsung / telak.</li><li><strong>3. ひょっとして:</strong> Jangan-jangan.</li><li><strong>4. もっぱら:</strong> Tepat. Hampir selalu / sebagian besar (exclusively).</li></ul>" },
            { id: 11, text: "【あまるほどたくさんある様子。】", options: ["ことごとく", "そこそこ", "まるまる", "ふんだん"], answer: 3, explanation: "Makna: Sesuatu yang tersedia dalam jumlah sangat banyak/melimpah.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. ことごとく:</strong> Semuanya.</li><li><strong>2. そこそこ:</strong> Lumayan / cukup.</li><li><strong>3. まるまる:</strong> Sepenuhnya.</li><li><strong>4. ふんだん:</strong> Tepat. Melimpah / berlimpah ruah (biasanya ふんだんに).</li></ul>" },
            { id: 12, text: "【無理をしないで、確実に努力を続ける様子。】", options: ["こつこつ", "すらすら", "さんざん", "わざわざ"], answer: 0, explanation: "Makna: Terus berusaha secara pasti sedikit demi sedikit.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. こつこつ:</strong> Tepat. Tekun / perlahan tapi pasti.</li><li><strong>2. すらすら:</strong> Lancar (membaca/berbicara).</li><li><strong>3. さんざん:</strong> Habis-habisan.</li><li><strong>4. わざわざ:</strong> Dengan sengaja (repot-repot).</li></ul>" },
            { id: 13, text: "【湿気が多くて気持ち悪いこと。】", options: ["ぐっしょり", "じめじめ", "しっとり", "ぐったり"], answer: 1, explanation: "Makna: Terasa lembap dan tidak nyaman.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. ぐっしょり:</strong> Basah kuyup.</li><li><strong>2. じめじめ:</strong> Tepat. Lembap / pengap / basah (untuk cuaca/ruangan atau sifat orang).</li><li><strong>3. しっとり:</strong> Lembap halus (berkonotasi positif, misal untuk kue atau kulit).</li><li><strong>4. ぐったり:</strong> Lemas / kelelahan.</li></ul>" },
            { id: 14, text: "【明るく光り輝く様子。】", options: ["こうこう", "はなはだ", "ひらひら", "がんがん"], answer: 0, explanation: "Makna: Bersinar dengan terang benderang.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. こうこう:</strong> Tepat. Bersinar terang (煌々と).</li><li><strong>2. はなはだ:</strong> Sangat.</li><li><strong>3. ひらひら:</strong> Berkibar / melambai.</li><li><strong>4. がんがん:</strong> Berdenyut kencang (sakit kepala) / suara bising memekakkan.</li></ul>" },
            { id: 15, text: "【きわめて短い時間に。】", options: ["さなかに", "いまに", "とっさに", "不意に"], answer: 2, explanation: "Makna: Dalam waktu yang sangat singkat / seketika.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. さなかに:</strong> Di tengah-tengah (kejadian).</li><li><strong>2. いまに:</strong> Suatu saat nanti / tak lama lagi.</li><li><strong>3. とっさに:</strong> Tepat. Secara seketika / refleks sekilas.</li><li><strong>4. 不意に:</strong> Tiba-tiba / tanpa disangka.</li></ul>" },
            { id: 16, text: "花は何でも好きですが、「特に」バラが好きです。", options: ["ことに", "もろに", "さぞ", "さも"], answer: 0, explanation: "Kata yang maknanya paling dekat dengan 特に (khususnya / terutama).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. ことに:</strong> Tepat. Bersinonim dengan 特に (殊に).</li><li><strong>2. もろに:</strong> Secara langsung / telak.</li><li><strong>3. さぞ:</strong> Pastilah (diikuti bentuk dugaan).</li><li><strong>4. さも:</strong> Seolah-olah (diikuti そうに/ように).</li></ul>" },
            { id: 17, text: "あの先生の哲学の講義は私には「まったく」理解できなかった。", options: ["あいにく", "何より", "さほど", "まるっきり"], answer: 3, explanation: "Kata yang maknanya paling dekat dengan まったく (sama sekali).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. あいにく:</strong> Sayang sekali / kebetulan yang buruk.</li><li><strong>2. 何より:</strong> Lebih dari apapun (terbaik).</li><li><strong>3. さほど:</strong> Tidak begitu (diikuti bentuk negatif).</li><li><strong>4. まるっきり:</strong> Tepat. Sama sekali (bersinonim dengan まったく...ない).</li></ul>" },
            { id: 18, text: "参加ご希望の方は、「前もって」申込書を提出してください。", options: ["いまさら", "かつて", "あらかじめ", "とっさに"], answer: 2, explanation: "Kata yang maknanya paling dekat dengan 前もって (sebelumnya / dari awal).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. いまさら:</strong> Baru sekarang (terlambat).</li><li><strong>2. かつて:</strong> Dulu / pernah.</li><li><strong>3. あらかじめ:</strong> Tepat. Sebelumnya / beforehand (予め).</li><li><strong>4. とっさに:</strong> Secara spontan.</li></ul>" },
            { id: 19, text: "彼は「たびたび」遅刻します。", options: ["いまだに", "しょっちゅう", "時折", "片時も"], answer: 1, explanation: "Kata yang maknanya paling dekat dengan たびたび (sering kali).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. いまだに:</strong> Sampai sekarang (masih belum...).</li><li><strong>2. しょっちゅう:</strong> Tepat. Sering / kerap kali.</li><li><strong>3. 時折 (ときおり):</strong> Kadang-kadang.</li><li><strong>4. 片時も:</strong> Sedetik pun (tidak).</li></ul>" },
            { id: 20, text: "横柄な店員の態度に「腹が立った」。", options: ["むかむかした", "はらはらした", "くよくよした", "おどおどした"], answer: 0, explanation: "Kata yang maknanya paling dekat dengan 腹が立つ (marah / kesal).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. むかむかした:</strong> Tepat. Merasa kesal, marah, atau mual.</li><li><strong>2. はらはらした:</strong> Berdebar cemas.</li><li><strong>3. くよくよした:</strong> Meratapi hal berlalu / terlalu dipikirkan.</li><li><strong>4. おどおどした:</strong> Gugup / takut.</li></ul>" },
            { id: 21, text: "到底 (とうてい)", options: ["その計画は「到底」進展するでしょう。", "そんな自分勝手な要求は、「到底」受け入れられません。", "今日は「到底」暑くないですね。", "タバコはここでは「到底」吸わないでください。"], answer: 1, explanation: "Penggunaan yang tepat untuk 到底 (とうてい...ない = sama sekali tidak mungkin / tidak bisa).<br>Opsi 2 paling tepat: 'Tuntutan egois seperti itu sama sekali tidak mungkin bisa diterima.'<br>Opsi 3 salah (lebih cocok memakai ちっとも/まったく)." },
            { id: 22, text: "ぐっしょり", options: ["傘が無かったので、かばんの中まで「ぐっしょり」ぬれてしまった。", "川の水が「ぐっしょり」流れている。", "今日は一日中雨が「ぐっしょり」降っていた。", "湿気が多くて部屋が「ぐっしょり」している。"], answer: 0, explanation: "Penggunaan yang tepat untuk ぐっしょり (basah kuyup).<br>Opsi 1 paling tepat: 'Karena tidak bawa payung, sampai ke dalam tas pun basah kuyup.'<br>Opsi 4 salah (seharusnya じめじめしている - lembap)." },
            { id: 23, text: "うんざり", options: ["その件に関しては「うんざり」考えてからお返事いたします。", "テレビは同じような番組ばかりで「うんざり」だ。", "彼女は風邪で熱があるのか、力なく「うんざり」寝ていた。", "あなたの言うことは、「うんざり」わかりません。"], answer: 1, explanation: "Penggunaan yang tepat untuk うんざり (muak / jemu / bosan).<br>Opsi 2 paling tepat: 'TV isinya acara yang mirip-mirip terus, jadi muak.'<br>Opsi 1 salah (seharusnya じっくり - dengan saksama). Opsi 4 salah (seharusnya まったく/ちっとも)." },
            { id: 24, text: "ことごとく", options: ["新型ロケットの打ち上げは「ことごとく」失敗してしまった。", "私はお酒では「ことごとく」ワインが好きです。", "駅まで「ことごとく」走り続けて、電車に間に合った。", "「ことごとく」できない問題を解いた。"], answer: 0, explanation: "Penggunaan yang tepat untuk ことごとく (semuanya / seluruhnya tanpa terkecuali).<br>Opsi 1 paling tepat: 'Peluncuran roket model baru semuanya gagal (tidak ada yang berhasil).' <br>Opsi 2 salah (seharusnya とりわけ/特に)." },
            { id: 25, text: "とりわけ", options: ["料理の前に「とりわけ」ビールを2本お願いします。", "休みの日は「とりわけ」家でごろごろしています。", "遠いところを「とりわけ」お越しいただきどうもありがとうございます。", "私は甘いものの中でも「とりわけ」ショートケーキが好きです。"], answer: 3, explanation: "Penggunaan yang tepat untuk とりわけ (khususnya / especially).<br>Opsi 4 paling tepat: 'Di antara makanan manis, saya khususnya suka shortcake.'<br>Opsi 1 salah (seharusnya とりあえず - untuk sementara/awal). Opsi 2 salah (seharusnya もっぱら - sebagian besar). Opsi 3 salah (seharusnya わざわざ - repot-repot)." }
        ];
    </script>

    <script>
        // --- 1. THEME MANAGEMENT ---
        function getSavedTheme() {
            return localStorage.getItem('jlpt_theme') || 'system';
        }

        function setTheme(theme) {
            localStorage.setItem('jlpt_theme', theme);
            
            document.querySelectorAll('.btn-theme').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-theme-${theme}`).classList.add('active');

            if (theme === 'system') {
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-bs-theme', systemPrefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-bs-theme', theme);
            }
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (getSavedTheme() === 'system') setTheme('system');
        });

        setTheme(getSavedTheme());

        // --- 2. STATE MANAGEMENT ---
        let state = JSON.parse(sessionStorage.getItem('jlpt_session_minggu3')) || {
            mode: null,          
            answers: {},         
            timeRemaining: 900,  
            isFinished: false,
            lastClicked: null    
        };
        let timerInterval;

        const saveState = () => sessionStorage.setItem('jlpt_session_minggu3', JSON.stringify(state));

        const resetSession = () => {
            if(confirm("Yakin ingin keluar? Riwayat ujian saat ini akan terhapus.")) {
                state = { mode: null, answers: {}, timeRemaining: 900, isFinished: false, lastClicked: null };
                saveState();
                clearInterval(timerInterval);
                renderHome();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        const returnToIndex = () => {
            window.location.href = "../index.html";
        };

        const app = document.getElementById('app');

        // --- 3. RENDERING ENGINE ---
        function renderHome() {
            app.innerHTML = `
                <div class="card card-exam mx-auto" style="max-width: 650px;">
                    <div class="card-body text-center p-4 p-md-5">
                        <div class="mb-4 text-primary">
                            <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary text-white mb-3 shadow" style="width: 80px; height: 80px;">
                                <i class="fas fa-torii-gate fa-2x"></i>
                            </div>
                            <h1 class="display-6 fw-bold mb-1" style="letter-spacing: -1px;">日本語能力試験 <span class="text-dark" data-bs-theme="dark" style="color: inherit;">N1</span></h1>
                        </div>
                        <h5 class="text-secondary mb-4 fw-bold">SOU MATOME - 第3週 副詞をじっくり学習しよう</h5>
                        <p class="mb-4 text-muted">Silakan pilih mode simulasi. <br class="d-none d-md-block">Uji kemampuan kosakata (Fukushi/Adverbia) Anda sekarang.</p>
                        
                        <div class="d-grid gap-3 mb-4">
                            <button onclick="startQuiz('asli')" class="btn btn-outline-primary btn-lg p-3 p-md-4 text-start position-relative shadow-sm rounded-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3 me-md-4 shadow" style="min-width: 50px; height: 50px;">
                                        <i class="fas fa-file-signature fa-lg"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">Mode Ujian Asli (本試験)</h5>
                                        <small style="font-size: 0.85rem;">15 Menit | Bisa perbaiki jawaban | Evaluasi Akhir</small>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startQuiz('latihan')" class="btn btn-outline-success btn-lg p-3 p-md-4 text-start position-relative shadow-sm rounded-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-3 me-md-4 shadow" style="min-width: 50px; height: 50px;">
                                        <i class="fas fa-book-reader fa-lg"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">Mode Latihan (練習)</h5>
                                        <small style="font-size: 0.85rem;">Santai | Langsung cek benar/salah & penjelasan</small>
                                    </div>
                                </div>
                            </button>
                        </div>
                        
                        <hr class="my-4">
                        <button onclick="returnToIndex()" class="btn btn-light border w-100 fw-bold rounded-pill text-muted">
                            <i class="fas fa-arrow-left me-2"></i> Kembali ke Menu Utama (.index.html)
                        </button>
                    </div>
                </div>
            `;
        }

        function startQuiz(mode) {
            state.mode = mode;
            state.isFinished = false;
            state.lastClicked = null;
            saveState();
            
            if (mode === 'asli' && !timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateTimer() {
            if (state.timeRemaining <= 0) {
                clearInterval(timerInterval);
                alert("Waktu Habis! Ujian otomatis dikumpulkan.");
                finishQuiz();
                return;
            }
            state.timeRemaining--;
            saveState();
            
            const timerEl = document.getElementById('timer-display');
            if (timerEl) {
                const m = Math.floor(state.timeRemaining / 60).toString().padStart(2, '0');
                const s = (state.timeRemaining % 60).toString().padStart(2, '0');
                
                if (state.timeRemaining < 180) { // Kurang dari 3 menit
                    timerEl.classList.remove('bg-primary');
                    timerEl.classList.add('timer-warning');
                }
                timerEl.innerHTML = `<i class="fas fa-stopwatch me-1"></i> ${m}:${s}`;
            }
        }

        window.selectOption = function(qId, optIndex) {
            if (state.isFinished) return;
            
            const isCorrect = hari3_data.find(q => q.id === qId).answer === optIndex;
            
            state.answers[qId] = optIndex;
            state.lastClicked = { qId, optIndex, isCorrect }; 
            
            saveState();
            renderQuiz();
        };

        function renderQuiz() {
            if (state.isFinished) return renderResult();

            let scoreLatihan = calculateScore();
            let totalAnswered = Object.keys(state.answers).length;
            let progress = (totalAnswered / hari3_data.length) * 100;

            let html = `
                <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4 sticky-top bg-body pt-3 pb-2 z-3" style="margin-top:-20px;">
                    <button onclick="resetSession()" class="btn btn-outline-secondary rounded-pill shadow-sm">
                        <i class="fas fa-times me-1"></i> Batal
                    </button>
                    ${state.mode === 'asli' 
                        ? `<span class="badge bg-primary fs-5 shadow px-3 py-2 rounded-pill" id="timer-display">
                            <i class="fas fa-stopwatch me-1"></i> ${Math.floor(state.timeRemaining / 60).toString().padStart(2, '0')}:${(state.timeRemaining % 60).toString().padStart(2, '0')}
                           </span>`
                        : `<span class="badge bg-success fs-5 shadow px-3 py-2 rounded-pill"><i class="fas fa-star me-1 text-warning"></i> Skor: ${scoreLatihan.total}</span>`
                    }
                </div>

                <div class="card card-exam mb-4 border-0">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-3 ${state.mode === 'asli' ? 'text-primary' : 'text-success'}">
                            <i class="${state.mode === 'asli' ? 'fas fa-pen-nib' : 'fas fa-dumbbell'} me-2"></i>
                            ${state.mode === 'asli' ? '本試験 (Ujian Asli) - 第3週' : '練習 (Mode Latihan) - 第3週'}
                        </h4>
                        <div class="progress" style="height: 12px; border-radius: 10px; background-color: var(--bs-secondary-bg);">
                            <div class="progress-bar progress-bar-striped progress-bar-animated ${state.mode === 'asli' ? 'bg-primary' : 'bg-success'}" 
                                 style="width: ${progress}%"></div>
                        </div>
                        <div class="text-end mt-2 fw-bold text-muted small">${totalAnswered} / ${hari3_data.length} Terjawab</div>
                    </div>
                </div>
            `;

            hari3_data.forEach((q, index) => {
                const userAnswer = state.answers[q.id];
                html += `
                    <div class="card card-exam mb-4" id="q${q.id}">
                        <div class="card-body p-3 p-md-4">
                            <div class="d-flex align-items-start mb-4">
                                <span class="badge badge-soal rounded-pill me-3 shadow-sm py-2 px-3">${index + 1}</span> 
                                <span class="soal-text lh-base">${q.text}</span>
                            </div>
                            <div class="row g-3 ms-md-4">
                `;

                q.options.forEach((opt, oIndex) => {
                    let btnClass = '';
                    let animateClass = '';
                    
                    if (state.mode === 'asli') {
                        if (userAnswer === oIndex) btnClass = 'btn-selected'; 
                    } else if (state.mode === 'latihan') {
                        if (userAnswer === oIndex) {
                            btnClass = (oIndex === q.answer) ? 'btn-success text-white' : 'btn-danger text-white';
                        } else if (userAnswer !== undefined && oIndex === q.answer) {
                            btnClass = 'border-success text-success fw-bold bg-success bg-opacity-10';
                        }
                    }

                    if (state.lastClicked && state.lastClicked.qId === q.id && state.lastClicked.optIndex === oIndex && state.mode === 'latihan') {
                        animateClass = state.lastClicked.isCorrect ? 'animate-correct' : 'animate-wrong';
                    }

                    html += `
                        <div class="col-12 col-md-6 d-grid">
                            <button onclick="selectOption(${q.id}, ${oIndex})" 
                                    class="btn btn-option border p-3 d-flex align-items-center ${btnClass} ${animateClass}">
                                <span class="opt-number shadow-sm">${oIndex + 1}</span>
                                <span>${opt}</span>
                            </button>
                        </div>
                    `;
                });

                if (state.mode === 'latihan' && userAnswer !== undefined) {
                    const isCorrect = userAnswer === q.answer;
                    html += `
                        <div class="col-12 mt-4 ms-md-4 w-auto">
                            <div class="p-3 explanation-box shadow-sm">
                                <h6 class="${isCorrect ? 'text-success' : 'text-danger'} fw-bold mb-2">
                                    <i class="${isCorrect ? 'fas fa-check-circle' : 'fas fa-times-circle'} me-1"></i>
                                    ${isCorrect ? 'Jawaban Tepat!' : 'Jawaban Kurang Tepat.'}
                                </h6>
                                <div class="small lh-lg">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `</div></div></div>`;
            });

            html += `
                <div class="text-center mt-5 mb-5 pb-5">
                    <button onclick="confirmFinish()" class="btn btn-primary btn-lg px-5 py-3 rounded-pill shadow fw-bold fs-5">
                        <i class="fas fa-paper-plane me-2"></i> Kumpulkan Ujian
                    </button>
                </div>
            `;

            app.innerHTML = html;
        }

        function calculateScore() {
            let correct = 0, wrong = 0;
            for (let qId in state.answers) {
                const q = hari3_data.find(x => x.id == qId);
                if (state.answers[qId] === q.answer) correct++;
                else wrong++;
            }
            return { correct, wrong, total: correct - wrong }; 
        }

        window.confirmFinish = function() {
            const answered = Object.keys(state.answers).length;
            if (answered < hari3_data.length) {
                if(!confirm(`Ada soal yang belum dijawab (${answered}/${hari3_data.length}). Yakin ingin mengumpulkan sekarang?`)) {
                    return;
                }
            } else {
                if(!confirm("Kumpulkan dan lihat hasil akhir?")) return;
            }
            finishQuiz();
        };

        window.finishQuiz = function() {
            state.isFinished = true;
            clearInterval(timerInterval);
            saveState();
            renderResult();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function renderResult() {
            const result = calculateScore();
            const answeredCount = Object.keys(state.answers).length;
            const unanswered = hari3_data.length - answeredCount;
            
            let grade = '不合格 (F)';
            let gradeColor = 'text-danger';
            let icon = 'fa-times-circle';
            
            if (result.total >= 20) { grade = '秀 (A+)'; gradeColor = 'text-success'; icon = 'fa-crown text-warning'; }
            else if (result.total >= 15) { grade = '優 (A)'; gradeColor = 'text-primary'; icon = 'fa-medal text-primary'; }
            else if (result.total >= 10) { grade = '良 (B)'; gradeColor = 'text-info'; icon = 'fa-thumbs-up text-info'; }
            else if (result.total >= 5) { grade = '可 (C)'; gradeColor = 'text-warning'; icon = 'fa-check text-warning'; }
            else if (result.total >= 0) { grade = '不可 (D)'; gradeColor = 'text-danger'; icon = 'fa-exclamation-triangle text-danger'; }

            let html = `
                <div class="card card-exam border-0 mb-5 text-center overflow-hidden">
                    <div class="bg-primary text-white py-4 shadow-sm">
                        <h2 class="fw-bold m-0"><i class="fas fa-poll me-2"></i> Hasil Simulasi N1 - 第3週</h2>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <i class="fas ${icon} fa-5x mb-3 drop-shadow"></i>
                        <h1 class="display-3 fw-bold mb-1 ${gradeColor}">${grade}</h1>
                        <h4 class="mb-4 text-muted fw-bold">Skor Anda: <span class="${gradeColor}">${result.total}</span> / 25</h4>
                        
                        <div class="row justify-content-center mb-5 g-3">
                            <div class="col-4 col-md-3">
                                <div class="bg-success text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-check-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Benar</h6>
                                    <h3 class="m-0 fw-bold">${result.correct}</h3>
                                </div>
                            </div>
                            <div class="col-4 col-md-3">
                                <div class="bg-danger text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-times-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Salah</h6>
                                    <h3 class="m-0 fw-bold">${result.wrong}</h3>
                                </div>
                            </div>
                            <div class="col-4 col-md-3">
                                <div class="bg-secondary text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-minus-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Kosong</h6>
                                    <h3 class="m-0 fw-bold">${unanswered}</h3>
                                </div>
                            </div>
                        </div>

                        <button onclick="resetSession()" class="btn btn-outline-primary btn-lg px-5 rounded-pill shadow-sm fw-bold">
                            <i class="fas fa-redo-alt me-2"></i> Ulangi Simulasi
                        </button>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4 border-bottom border-primary border-2 pb-2">
                    <i class="fas fa-list-check fa-2x me-3 text-primary"></i>
                    <h3 class="fw-bold m-0 text-primary">Evaluasi Detail</h3>
                </div>
            `;

            hari3_data.forEach((q, index) => {
                const userAnswer = state.answers[q.id];
                const isCorrect = userAnswer === q.answer;
                const isUnanswered = userAnswer === undefined;
                
                let borderClass = isUnanswered ? 'border-secondary' : (isCorrect ? 'border-success' : 'border-danger');
                let badgeStatus = isUnanswered 
                    ? '<span class="badge bg-secondary rounded-pill px-3"><i class="fas fa-minus me-1"></i> Kosong</span>' 
                    : (isCorrect ? '<span class="badge bg-success rounded-pill px-3"><i class="fas fa-check me-1"></i> Benar</span>' : '<span class="badge bg-danger rounded-pill px-3"><i class="fas fa-times me-1"></i> Salah</span>');

                html += `
                    <div class="card card-exam mb-4 shadow-sm border-0" style="border-left: 6px solid ${isUnanswered ? '#6c757d' : (isCorrect ? '#198754' : '#dc3545')} !important; border-top: none;">
                        <div class="card-body p-4">
                            <h5 class="mb-3 lh-base">
                                ${badgeStatus} <span class="ms-2 fw-bold text-muted">No. ${index + 1}</span>
                            </h5>
                            <h5 class="fw-bold mb-4">${q.text}</h5>
                            
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="p-3 rounded-4 bg-light text-dark h-100 ${!isUnanswered && !isCorrect ? 'border border-danger border-2' : 'border border-light'}">
                                        <small class="text-muted d-block mb-2 fw-bold"><i class="fas fa-user-edit me-1"></i> Jawaban Anda:</small>
                                        <strong class="${isCorrect ? 'text-success' : (!isUnanswered ? 'text-danger' : 'text-muted')} fs-6">
                                            ${isUnanswered ? '<em>Tidak dijawab</em>' : (userAnswer + 1) + '. ' + q.options[userAnswer]}
                                        </strong>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="p-3 rounded-4 bg-light text-dark h-100 border border-success border-2" style="background-color: rgba(25,135,84,0.05) !important;">
                                        <small class="text-success d-block mb-2 fw-bold"><i class="fas fa-key me-1"></i> Kunci Jawaban:</small>
                                        <strong class="text-success fs-6">
                                            ${(q.answer + 1)}. ${q.options[q.answer]}
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <div class="explanation-box p-3 rounded-3">
                                <span class="badge bg-primary mb-2">解説 (Penjelasan)</span>
                                <div class="lh-lg small">${q.explanation}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `<div class="mb-5 pb-5"></div>`;
            app.innerHTML = html;
        }

        // --- 4. INIT ---
        if (state.mode && !state.isFinished) {
            if (state.mode === 'asli' && !timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderQuiz();
        } else if (state.isFinished) {
            renderResult();
        } else {
            renderHome();
        }
    </script>
</body>
</html>
