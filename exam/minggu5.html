<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N1 Simulator - Minggu 5</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Warna Merah Khas JLPT */
            --jlpt-red: #e60012;
            --jlpt-red-dark: #b3000e;
            --jlpt-red-light: #ffe5e6;
            --transition-speed: 0.3s;
        }

        body {
            /* Motif Jepang Halus di Background */
            background-color: #f4f6f9;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e60012' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            transition: background-color var(--transition-speed), color var(--transition-speed);
            font-family: 'Noto Sans JP', 'Segoe UI', Tahoma, sans-serif;
        }

        /* Override Bootstrap Primary Color dengan JLPT Red */
        .text-primary { color: var(--jlpt-red) !important; }
        .bg-primary { background-color: var(--jlpt-red) !important; }
        .border-primary { border-color: var(--jlpt-red) !important; }
        
        .btn-primary {
            background-color: var(--jlpt-red);
            border-color: var(--jlpt-red);
            color: white;
            box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
        }
        .btn-primary:hover {
            background-color: var(--jlpt-red-dark);
            border-color: var(--jlpt-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(230, 0, 18, 0.4);
        }
        
        .btn-outline-primary {
            color: var(--jlpt-red);
            border-color: var(--jlpt-red);
        }
        .btn-outline-primary:hover {
            background-color: var(--jlpt-red);
            color: white;
        }

        /* Styling Kartu */
        .card-exam {
            border: none;
            border-radius: 16px;
            border-top: 6px solid var(--jlpt-red);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
        }

        [data-bs-theme="dark"] body {
            background-color: #121212;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        [data-bs-theme="dark"] .card-exam {
            background-color: #1e1e1e;
            border-top: 6px solid var(--jlpt-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Tombol Opsi Jawaban */
        .btn-option {
            border-radius: 12px;
            border-width: 2px;
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
            font-size: 1.05rem;
            color: inherit;
            background-color: transparent;
            border-color: #dee2e6;
        }

        [data-bs-theme="dark"] .btn-option { border-color: #444; color: #f8f9fa; }

        .btn-option:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--jlpt-red);
            background-color: var(--jlpt-red-light);
            color: #333;
        }
        [data-bs-theme="dark"] .btn-option:hover:not(:disabled) {
            background-color: rgba(230, 0, 18, 0.2);
            color: #fff;
        }

        /* Kustomisasi Mode Terpilih (Mode Asli) */
        .btn-selected {
            background-color: var(--jlpt-red) !important;
            color: white !important;
            border-color: var(--jlpt-red) !important;
            box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
        }

        /* Nomor Opsi pada Tombol */
        .opt-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #e9ecef;
            color: #495057;
            font-weight: bold;
            margin-right: 12px;
            transition: all 0.3s ease;
        }
        [data-bs-theme="dark"] .opt-number { background-color: #333; color: #fff; }
        .btn-selected .opt-number, .btn-success .opt-number, .btn-danger .opt-number {
            background-color: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }

        /* Animasi Benar/Salah */
        @keyframes pulse-success {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.7); }
            50% { transform: scale(1.03); background-color: #198754; color: white; box-shadow: 0 0 0 10px rgba(25, 135, 84, 0); }
            100% { transform: scale(1); background-color: #198754; color: white; border-color: #198754; }
        }

        @keyframes shake-error {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
            50% { background-color: #dc3545; color: white; }
            100% { background-color: #dc3545; color: white; border-color: #dc3545; }
        }

        .animate-correct { animation: pulse-success 0.5s ease-out forwards; }
        .animate-wrong { animation: shake-error 0.5s ease-in-out forwards; }

        /* Timer Pulse */
        @keyframes pulse-danger {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .timer-warning { animation: pulse-danger 1s infinite; background-color: #dc3545 !important; }

        /* Theme Switcher Widget */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bs-body-bg);
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid var(--jlpt-red);
        }

        .btn-theme {
            border-radius: 50%;
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--bs-body-color);
            transition: all 0.3s;
        }

        .btn-theme.active {
            background: var(--jlpt-red);
            color: white;
            box-shadow: 0 2px 8px rgba(230, 0, 18, 0.4);
        }
        
        .explanation-box {
            border-left: 5px solid var(--jlpt-red);
            background-color: var(--jlpt-red-light);
            border-radius: 0 12px 12px 0;
            color: #333;
        }
        [data-bs-theme="dark"] .explanation-box {
            background-color: rgba(230, 0, 18, 0.1);
            color: #eee;
        }

        .explanation-list li { margin-bottom: 6px; }
        .soal-text { font-size: 1.25rem; font-weight: 700; color: inherit; }
        .badge-soal { background-color: var(--jlpt-red); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="theme-switcher d-flex gap-1">
        <button class="btn-theme" id="btn-theme-light" onclick="setTheme('light')" title="Light Mode">
            <i class="fas fa-sun"></i>
        </button>
        <button class="btn-theme" id="btn-theme-dark" onclick="setTheme('dark')" title="Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
        <button class="btn-theme" id="btn-theme-system" onclick="setTheme('system')" title="System Theme">
            <i class="fas fa-desktop"></i>
        </button>
    </div>

    <div class="container py-5" id="app">
        </div>

    <script>
        const hari5_data = [
            { id: 1, text: "新薬の効果をまず動物で（  ）研究しています。", options: ["慣らして", "荒らして", "試して", "志して"], answer: 2, explanation: "Konteks: Menguji efek obat baru pada hewan terlebih dahulu.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 慣らして:</strong> Membiasakan.</li><li><strong>2. 荒らして:</strong> Merusak / mengacaukan.</li><li><strong>3. 試して (ためして):</strong> Tepat. Menguji / mencoba.</li><li><strong>4. 志して:</strong> Bercita-cita.</li></ul>" },
            { id: 2, text: "兄弟でもめないように、ケーキを（  ）に切り分けた。", options: ["公正", "公私", "公用", "公平"], answer: 3, explanation: "Konteks: Membagi kue dengan adil agar tidak bertengkar.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 公正:</strong> Adil dan benar (secara hukum/dokumen).</li><li><strong>2. 公私:</strong> Publik dan privat.</li><li><strong>3. 公用:</strong> Keperluan dinas/resmi.</li><li><strong>4. 公平 (こうへい):</strong> Tepat. Adil / merata (dalam pembagian/kesempatan).</li></ul>" },
            { id: 3, text: "（  ）だけでささやかな結婚式を挙げた。", options: ["身近", "身内", "身の上", "単身"], answer: 1, explanation: "Konteks: Mengadakan pernikahan sederhana hanya dengan kerabat/keluarga.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 身近 (みぢか):</strong> Dekat (secara jarak/hubungan umum).</li><li><strong>2. 身内 (みうち):</strong> Tepat. Kerabat / keluarga / orang dalam.</li><li><strong>3. 身の上 (みのうえ):</strong> Riwayat hidup / nasib pribadi.</li><li><strong>4. 単身 (たんしん):</strong> Sendirian / sebatang kara.</li></ul>" },
            { id: 4, text: "隣人は変わっているが、このあたりは環境に（  ）地域です。", options: ["恵まれている", "悩まされている", "和んでいる", "目覚めている"], answer: 0, explanation: "Konteks: Tetangganya memang aneh, tapi daerah ini lingkungannya bagus/mendukung.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 恵まれている (めぐまれている):</strong> Tepat. Diberkati / dikaruniai (hal baik seperti lingkungan/bakat).</li><li><strong>2. 悩まされている:</strong> Diganggu / direpotkan.</li><li><strong>3. 和んでいる:</strong> Menjadi tenang/hangat.</li><li><strong>4. 目覚めている:</strong> Terbangun / sadar.</li></ul>" },
            { id: 5, text: "この新しい装置は自動車産業にとって、（  ）な発明である。", options: ["客観的", "正当的", "画期的", "根本的"], answer: 2, explanation: "Konteks: Perangkat baru ini adalah penemuan revolusioner/mutakhir bagi industri otomotif.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 客観的:</strong> Objektif.</li><li><strong>2. 正当的:</strong> Bukan kata umum (seharusnya 正当な).</li><li><strong>3. 画期的 (かっきてき):</strong> Tepat. Sangat inovatif / revolusioner (epoch-making).</li><li><strong>4. 根本的:</strong> Mendasar / fundamental.</li></ul>" },
            { id: 6, text: "彼の推理は、はなはだしく（  ）違いだ。", options: ["実態", "見当", "根気", "内訳"], answer: 1, explanation: "Konteks: Tebakannya / penalarannya sangat meleset jauh.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 実態:</strong> Realitas / kenyataan sebenarnya.</li><li><strong>2. 見当 (けんとう):</strong> Tepat. Dugaan/perkiraan. (見当違い = salah tebak / meleset / salah sasaran).</li><li><strong>3. 根気:</strong> Ketekunan / kesabaran.</li><li><strong>4. 内訳:</strong> Rincian.</li></ul>" },
            { id: 7, text: "彼はまだ高校1年生だが、将来（  ）な野球選手になるだろう。", options: ["有益", "有力", "有望", "画期的"], answer: 2, explanation: "Konteks: Meskipun masih kelas 1 SMA, dia kelak akan menjadi pemain bisbol yang menjanjikan.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 有益 (ゆうえき):</strong> Bermanfaat / menguntungkan.</li><li><strong>2. 有力 (ゆうりょく):</strong> Berpengaruh / kuat (kandidat kuat).</li><li><strong>3. 有望 (ゆうぼう):</strong> Tepat. Menjanjikan / punya prospek cerah (promising).</li><li><strong>4. 画期的:</strong> Revolusioner.</li></ul>" },
            { id: 8, text: "仕事をサボって、マージャンに（  ）いたところを上司に見つかってしまった。", options: ["演じて", "興じて", "群がって", "病んで"], answer: 1, explanation: "Konteks: Bolos kerja dan asyik bersenang-senang main mahjong lalu ketahuan atasan.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 演じて:</strong> Memerankan / berakting.</li><li><strong>2. 興じて (きょうじて):</strong> Tepat. Bersenang-senang / asyik dengan suatu hiburan (興じる).</li><li><strong>3. 群がって:</strong> Berkerumun.</li><li><strong>4. 病んで:</strong> Jatuh sakit / menderita (penyakit mental/fisik).</li></ul>" },
            { id: 9, text: "（  ）通りのやり方ではだめだ。別の対策を考えなければならない。", options: ["従来", "自己", "意欲", "手際"], answer: 0, explanation: "Konteks: Cara yang konvensional / seperti selama ini sudah tidak bisa digunakan lagi.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 従来 (じゅうらい):</strong> Tepat. Hingga saat ini / tradisional (従来通り = seperti yang sudah-sudah).</li><li><strong>2. 自己:</strong> Diri sendiri.</li><li><strong>3. 意欲:</strong> Kemauan / motivasi.</li><li><strong>4. 手際 (てぎわ):</strong> Keterampilan / kecakapan (dalam menangani sesuatu).</li></ul>" },
            { id: 10, text: "彼女の家がゴミだらけだという（  ）を誰も知らない。", options: ["言い訳", "表向き", "現行", "実態"], answer: 3, explanation: "Konteks: Tidak ada yang tahu kenyataan/situasi sebenarnya bahwa rumahnya penuh sampah.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 言い訳:</strong> Alasan / dalih.</li><li><strong>2. 表向き:</strong> Penampilan luar / alasan publik (berlawanan dengan niat asli).</li><li><strong>3. 現行:</strong> Saat ini berlaku / yang sekarang ada (現行法 = hukum yang berlaku).</li><li><strong>4. 実態 (じったい):</strong> Tepat. Kondisi / kenyataan sebenarnya (true state).</li></ul>" },
            { id: 11, text: "【道具や言葉をうまく使う。】", options: ["保つ", "備わる", "操る", "整える"], answer: 2, explanation: "Makna: Menggunakan atau mengoperasikan alat dan bahasa dengan mahir.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 保つ:</strong> Mempertahankan / menjaga.</li><li><strong>2. 備わる:</strong> Dilengkapi / dimiliki (secara alami).</li><li><strong>3. 操る (あやつる):</strong> Tepat. Mengendalikan / memanipulasi / mahir menggunakan (bahasa).</li><li><strong>4. 整える:</strong> Merapikan / menyiapkan.</li></ul>" },
            { id: 12, text: "【どうもそうらしいと感覚的に感じる様子。】", options: ["根気", "気配", "予告", "告知"], answer: 1, explanation: "Makna: Merasakan tanda-tanda atau firasat bahwa ada sesuatu.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 根気:</strong> Ketekunan / daya tahan mental.</li><li><strong>2. 気配 (けはい):</strong> Tepat. Firasat / tanda-tanda kehadiran sesuatu (sign/presence).</li><li><strong>3. 予告:</strong> Pemberitahuan sebelumnya / trailer.</li><li><strong>4. 告知:</strong> Pengumuman.</li></ul>" },
            { id: 13, text: "【りっぱに見えたりして、目立つ。】", options: ["栄える", "映える", "生える", "帯びる"], answer: 1, explanation: "Makna: Terlihat bagus/indah dan menonjol.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 栄える (さかえる):</strong> Berkembang pesat / makmur (kota/bisnis).</li><li><strong>2. 映える (はえる):</strong> Tepat. Bersinar / terlihat sangat menarik (stand out/look attractive).</li><li><strong>3. 生える:</strong> Tumbuh (rambut/tanaman).</li><li><strong>4. 帯びる:</strong> Mengandung / memakai (nuansa/misi).</li></ul>" },
            { id: 14, text: "【どれもこれもすべて。】", options: ["良し悪し", "個々", "不可欠", "軒並み"], answer: 3, explanation: "Makna: Semuanya tanpa terkecuali (secara merata).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 良し悪し:</strong> Baik buruknya.</li><li><strong>2. 個々:</strong> Individu / satu-satu.</li><li><strong>3. 不可欠:</strong> Mutlak diperlukan / esensial.</li><li><strong>4. 軒並み (のきなみ):</strong> Tepat. Semuanya / secara menyeluruh (across the board).</li></ul>" },
            { id: 15, text: "【中心となって適切に物事を処理する。】", options: ["仕入れる", "徹する", "仕切る", "手掛ける"], answer: 2, explanation: "Makna: Menjadi pihak utama yang mengatur dan mengelola suatu hal.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 仕入れる:</strong> Membeli stok barang / kulakan.</li><li><strong>2. 徹する:</strong> Mengabdikan diri penuh / tembus.</li><li><strong>3. 仕切る (しきる):</strong> Tepat. Memimpin / mengelola / mengambil alih tanggung jawab acara.</li><li><strong>4. 手掛ける:</strong> Menangani / memulai (suatu proyek).</li></ul>" },
            { id: 16, text: "この電球は高いが、大幅な電気代の節約になるという<u>メリット</u>がある。", options: ["利点", "有力", "有益", "利子"], answer: 0, explanation: "Kata yang bersinonim dengan メリット (merit / keuntungan).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 利点 (りてん):</strong> Tepat. Keuntungan / sisi positif / kelebihan.</li><li><strong>2. 有力:</strong> Berpengaruh / kuat.</li><li><strong>3. 有益:</strong> Bermanfaat (biasanya tidak dipakai sebagai sinonim langsung untuk merit pada barang).</li><li><strong>4. 利子:</strong> Bunga (bank).</li></ul>" },
            { id: 17, text: "成績でずっと一位を<u>維持する</u>のは難しいことだ。", options: ["経る", "徹する", "保つ", "築く"], answer: 2, explanation: "Kata yang bersinonim dengan 維持する (mempertahankan).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 経る:</strong> Melewati (waktu/tempat).</li><li><strong>2. 徹する:</strong> Mengabdikan diri.</li><li><strong>3. 保つ (たもつ):</strong> Tepat. Menjaga / mempertahankan kondisi (to keep/maintain).</li><li><strong>4. 築く:</strong> Membangun (kepercayaan/bangunan).</li></ul>" },
            { id: 18, text: "彼は用事を<u>言いつけて</u>ばかりで、自分では何もしない。", options: ["負かして", "指図して", "言い訳して", "任せて"], answer: 1, explanation: "Kata yang bersinonim dengan 言いつける (memerintah / menyuruh orang lain).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 負かして:</strong> Mengalahkan.</li><li><strong>2. 指図して (さしずして):</strong> Tepat. Memberi instruksi / memerintah.</li><li><strong>3. 言い訳して:</strong> Mencari alasan.</li><li><strong>4. 任せて:</strong> Menyerahkan tanggung jawab.</li></ul>" },
            { id: 19, text: "そちらに伺いたいのですが、<u>一番近い</u>駅はどこでしょうか。", options: ["身近な", "目の当たりの", "最寄りの", "身の回りの"], answer: 2, explanation: "Kata yang bersinonim dengan 一番近い (yang paling dekat, khusus untuk stasiun/fasilitas).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 身近な:</strong> Dekat (secara hubungan emosional atau topik keseharian).</li><li><strong>2. 目の当たりの:</strong> Terjadi tepat di depan mata.</li><li><strong>3. 最寄りの (もよりの):</strong> Tepat. Terdekat (biasanya untuk fasilitas: 最寄り駅 = stasiun terdekat).</li><li><strong>4. 身の回りの:</strong> Barang-barang pribadi sehari-hari.</li></ul>" },
            { id: 20, text: "父の<u>命令を聞かないで</u>、大学をやめた。", options: ["命令を制して", "命令を脱して", "命令に背いて", "命令に徹して"], answer: 2, explanation: "Kata yang bersinonim dengan 命令を聞かない (tidak menuruti/melanggar perintah).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 制して:</strong> Mengendalikan / memenangkan.</li><li><strong>2. 脱して:</strong> Melepaskan diri / lolos dari.</li><li><strong>3. 背いて (そむいて):</strong> Tepat. Membangkang / mengkhianati / melanggar perintah.</li><li><strong>4. 徹して:</strong> Mengabdikan diri sepenuhnya.</li></ul>" },
            { id: 21, text: "和む (なごむ)", options: ["朝から気持ちが悪かったが、少し寝たら「和みました」。", "日本の国旗が空に「和んで」いた。", "彼のジョークのおかげで、固かった雰囲気が一気に「和んだ」。", "彼とは古くから「和んだ」友達です。"], answer: 2, explanation: "Penggunaan yang tepat untuk 和む (suasana menjadi tenang, hangat, atau santai).<br>Opsi 3 paling tepat: 'Berkat leluconnya, suasana yang kaku langsung menjadi cair (hangat).' <br>Opsi 1 salah (治った). Opsi 2 salah (なびいていた/はためいていた). Opsi 4 salah (親しい)." },
            { id: 22, text: "勝手 (かって)", options: ["「勝手に」決めないで、私にも相談してください。", "秋になって気温が「勝手に」下がってきた。", "あなたの意見を聞けないのは、私「勝手」です。", "「勝手」の結果で、不合格になってしまった。"], answer: 0, explanation: "Penggunaan yang tepat untuk 勝手 (seenaknya / tanpa izin / tanpa peduli orang lain).<br>Opsi 1 paling tepat: 'Jangan putuskan seenaknya sendiri, diskusikan denganku juga.'<br>Opsi 2 salah (seharusnya 自然に/次第に). Opsi 3 salah (seharusnya 都合). Opsi 4 salah (seharusnya 自分のせいで/努力不足)." },
            { id: 23, text: "値しない (あたいしない)", options: ["その製品は「値しない」評判がある。", "彼女の行動は問題があるから、私に「値しない」人物だ。", "この本は内容に「値しない」と言われている。", "社員を大事にしない会社は、信頼に「値しない」。"], answer: 3, explanation: "Penggunaan yang tepat untuk 値しない (tidak pantas / tidak layak untuk...).<br>Opsi 4 paling tepat: 'Perusahaan yang tidak menghargai karyawannya, tidak layak untuk dipercaya (信頼に値しない).' <br>Opsi 1 salah (芳しくない). Opsi 2 salah (ふさわしくない). Opsi 3 salah (ふさわしくない/見合わない)." },
            { id: 24, text: "根回し (ねまわし)", options: ["今度は、「根回さない」ようにしたから大丈夫です。", "選挙での「根回し」が失敗して、彼は落選したと言われている。", "大至急この書類を「根回し」しておいてください。", "「根回し」で会社をやめたけれど、後悔している。"], answer: 1, explanation: "Penggunaan yang tepat untuk 根回し (lobi-lobi / pendekatan rahasia sebelum mengambil keputusan formal).<br>Opsi 2 paling tepat: 'Kabarnya dia gagal terpilih karena lobi-lobi pemilunya berantakan.'<br>Opsi 1 salah (seharusnya 失敗しない). Opsi 3 salah (seharusnya 回覧 - edarkan). Opsi 4 salah (seharusnya 勢い/感情的)." },
            { id: 25, text: "実入り (みいり)", options: ["今年は会社に三人の「実入り」が来た。", "今度の仕事はかなり「実入り」がよい。", "彼は若いが、とても「実入り」がよい。", "彼女は初心者ながら、立派に「実入り」を果たした。"], answer: 1, explanation: "Penggunaan yang tepat untuk 実入り (keuntungan / penghasilan yang masuk).<br>Opsi 2 paling tepat: 'Pekerjaan kali ini keuntungannya (bayarannya) cukup bagus.'<br>Opsi 1 salah (seharusnya 新入り - pegawai baru). Opsi 3 salah (seharusnya 見どころがある - menjanjikan). Opsi 4 salah (seharusnya 役割/責任 - tugas)." }
        ];
    </script>

    <script>
        // --- 1. THEME MANAGEMENT ---
        function getSavedTheme() {
            return localStorage.getItem('jlpt_theme') || 'system';
        }

        function setTheme(theme) {
            localStorage.setItem('jlpt_theme', theme);
            
            document.querySelectorAll('.btn-theme').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-theme-${theme}`).classList.add('active');

            if (theme === 'system') {
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-bs-theme', systemPrefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-bs-theme', theme);
            }
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (getSavedTheme() === 'system') setTheme('system');
        });

        setTheme(getSavedTheme());

        // --- 2. STATE MANAGEMENT ---
        let state = JSON.parse(sessionStorage.getItem('jlpt_session_minggu5')) || {
            mode: null,          
            answers: {},         
            timeRemaining: 900,  
            isFinished: false,
            lastClicked: null    
        };
        let timerInterval;

        const saveState = () => sessionStorage.setItem('jlpt_session_minggu5', JSON.stringify(state));

        const resetSession = () => {
            if(confirm("Yakin ingin keluar? Riwayat ujian saat ini akan terhapus.")) {
                state = { mode: null, answers: {}, timeRemaining: 900, isFinished: false, lastClicked: null };
                saveState();
                clearInterval(timerInterval);
                renderHome();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        const returnToIndex = () => {
            window.location.href = "../index.html";
        };

        const app = document.getElementById('app');

        // --- 3. RENDERING ENGINE ---
        function renderHome() {
            app.innerHTML = `
                <div class="card card-exam mx-auto" style="max-width: 650px;">
                    <div class="card-body text-center p-4 p-md-5">
                        <div class="mb-4 text-primary">
                            <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary text-white mb-3 shadow" style="width: 80px; height: 80px;">
                                <i class="fas fa-torii-gate fa-2x"></i>
                            </div>
                            <h1 class="display-6 fw-bold mb-1" style="letter-spacing: -1px;">日本語能力試験 <span class="text-dark" data-bs-theme="dark" style="color: inherit;">N1</span></h1>
                        </div>
                        <h5 class="text-secondary mb-4 fw-bold">SOU MATOME - 第5週 中級漢字の語彙を覚えよう</h5>
                        <p class="mb-4 text-muted">Silakan pilih mode simulasi. <br class="d-none d-md-block">Uji kemampuan kosakata kanji menengah tingkat lanjut Anda sekarang.</p>
                        
                        <div class="d-grid gap-3 mb-4">
                            <button onclick="startQuiz('asli')" class="btn btn-outline-primary btn-lg p-3 p-md-4 text-start position-relative shadow-sm rounded-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3 me-md-4 shadow" style="min-width: 50px; height: 50px;">
                                        <i class="fas fa-file-signature fa-lg"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">Mode Ujian Asli (本試験)</h5>
                                        <small style="font-size: 0.85rem;">15 Menit | Bisa perbaiki jawaban | Evaluasi Akhir</small>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startQuiz('latihan')" class="btn btn-outline-success btn-lg p-3 p-md-4 text-start position-relative shadow-sm rounded-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-3 me-md-4 shadow" style="min-width: 50px; height: 50px;">
                                        <i class="fas fa-book-reader fa-lg"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">Mode Latihan (練習)</h5>
                                        <small style="font-size: 0.85rem;">Santai | Langsung cek benar/salah & penjelasan</small>
                                    </div>
                                </div>
                            </button>
                        </div>
                        
                        <hr class="my-4">
                        <button onclick="returnToIndex()" class="btn btn-light border w-100 fw-bold rounded-pill text-muted">
                            <i class="fas fa-arrow-left me-2"></i> Kembali ke Menu Utama (.index.html)
                        </button>
                    </div>
                </div>
            `;
        }

        function startQuiz(mode) {
            state.mode = mode;
            state.isFinished = false;
            state.lastClicked = null;
            saveState();
            
            if (mode === 'asli' && !timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateTimer() {
            if (state.timeRemaining <= 0) {
                clearInterval(timerInterval);
                alert("Waktu Habis! Ujian otomatis dikumpulkan.");
                finishQuiz();
                return;
            }
            state.timeRemaining--;
            saveState();
            
            const timerEl = document.getElementById('timer-display');
            if (timerEl) {
                const m = Math.floor(state.timeRemaining / 60).toString().padStart(2, '0');
                const s = (state.timeRemaining % 60).toString().padStart(2, '0');
                
                if (state.timeRemaining < 180) { // Kurang dari 3 menit
                    timerEl.classList.remove('bg-primary');
                    timerEl.classList.add('timer-warning');
                }
                timerEl.innerHTML = `<i class="fas fa-stopwatch me-1"></i> ${m}:${s}`;
            }
        }

        window.selectOption = function(qId, optIndex) {
            if (state.isFinished) return;
            
            const isCorrect = hari5_data.find(q => q.id === qId).answer === optIndex;
            
            state.answers[qId] = optIndex;
            state.lastClicked = { qId, optIndex, isCorrect }; 
            
            saveState();
            renderQuiz();
        };

        function renderQuiz() {
            if (state.isFinished) return renderResult();

            let scoreLatihan = calculateScore();
            let totalAnswered = Object.keys(state.answers).length;
            let progress = (totalAnswered / hari5_data.length) * 100;

            let html = `
                <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4 sticky-top bg-body pt-3 pb-2 z-3" style="margin-top:-20px;">
                    <button onclick="resetSession()" class="btn btn-outline-secondary rounded-pill shadow-sm">
                        <i class="fas fa-times me-1"></i> Batal
                    </button>
                    ${state.mode === 'asli' 
                        ? `<span class="badge bg-primary fs-5 shadow px-3 py-2 rounded-pill" id="timer-display">
                            <i class="fas fa-stopwatch me-1"></i> ${Math.floor(state.timeRemaining / 60).toString().padStart(2, '0')}:${(state.timeRemaining % 60).toString().padStart(2, '0')}
                           </span>`
                        : `<span class="badge bg-success fs-5 shadow px-3 py-2 rounded-pill"><i class="fas fa-star me-1 text-warning"></i> Skor: ${scoreLatihan.total}</span>`
                    }
                </div>

                <div class="card card-exam mb-4 border-0">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-3 ${state.mode === 'asli' ? 'text-primary' : 'text-success'}">
                            <i class="${state.mode === 'asli' ? 'fas fa-pen-nib' : 'fas fa-dumbbell'} me-2"></i>
                            ${state.mode === 'asli' ? '本試験 (Ujian Asli) - 第5週' : '練習 (Mode Latihan) - 第5週'}
                        </h4>
                        <div class="progress" style="height: 12px; border-radius: 10px; background-color: var(--bs-secondary-bg);">
                            <div class="progress-bar progress-bar-striped progress-bar-animated ${state.mode === 'asli' ? 'bg-primary' : 'bg-success'}" 
                                 style="width: ${progress}%"></div>
                        </div>
                        <div class="text-end mt-2 fw-bold text-muted small">${totalAnswered} / ${hari5_data.length} Terjawab</div>
                    </div>
                </div>
            `;

            hari5_data.forEach((q, index) => {
                const userAnswer = state.answers[q.id];
                html += `
                    <div class="card card-exam mb-4" id="q${q.id}">
                        <div class="card-body p-3 p-md-4">
                            <div class="d-flex align-items-start mb-4">
                                <span class="badge badge-soal rounded-pill me-3 shadow-sm py-2 px-3">${index + 1}</span> 
                                <span class="soal-text lh-base">${q.text}</span>
                            </div>
                            <div class="row g-3 ms-md-4">
                `;

                q.options.forEach((opt, oIndex) => {
                    let btnClass = '';
                    let animateClass = '';
                    
                    if (state.mode === 'asli') {
                        if (userAnswer === oIndex) btnClass = 'btn-selected'; 
                    } else if (state.mode === 'latihan') {
                        if (userAnswer === oIndex) {
                            btnClass = (oIndex === q.answer) ? 'btn-success text-white' : 'btn-danger text-white';
                        } else if (userAnswer !== undefined && oIndex === q.answer) {
                            btnClass = 'border-success text-success fw-bold bg-success bg-opacity-10';
                        }
                    }

                    if (state.lastClicked && state.lastClicked.qId === q.id && state.lastClicked.optIndex === oIndex && state.mode === 'latihan') {
                        animateClass = state.lastClicked.isCorrect ? 'animate-correct' : 'animate-wrong';
                    }

                    html += `
                        <div class="col-12 col-md-6 d-grid">
                            <button onclick="selectOption(${q.id}, ${oIndex})" 
                                    class="btn btn-option border p-3 d-flex align-items-center ${btnClass} ${animateClass}">
                                <span class="opt-number shadow-sm">${oIndex + 1}</span>
                                <span>${opt}</span>
                            </button>
                        </div>
                    `;
                });

                if (state.mode === 'latihan' && userAnswer !== undefined) {
                    const isCorrect = userAnswer === q.answer;
                    html += `
                        <div class="col-12 mt-4 ms-md-4 w-auto">
                            <div class="p-3 explanation-box shadow-sm">
                                <h6 class="${isCorrect ? 'text-success' : 'text-danger'} fw-bold mb-2">
                                    <i class="${isCorrect ? 'fas fa-check-circle' : 'fas fa-times-circle'} me-1"></i>
                                    ${isCorrect ? 'Jawaban Tepat!' : 'Jawaban Kurang Tepat.'}
                                </h6>
                                <div class="small lh-lg">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `</div></div></div>`;
            });

            html += `
                <div class="text-center mt-5 mb-5 pb-5">
                    <button onclick="confirmFinish()" class="btn btn-primary btn-lg px-5 py-3 rounded-pill shadow fw-bold fs-5">
                        <i class="fas fa-paper-plane me-2"></i> Kumpulkan Ujian
                    </button>
                </div>
            `;

            app.innerHTML = html;
        }

        function calculateScore() {
            let correct = 0, wrong = 0;
            for (let qId in state.answers) {
                const q = hari5_data.find(x => x.id == qId);
                if (state.answers[qId] === q.answer) correct++;
                else wrong++;
            }
            return { correct, wrong, total: correct - wrong }; 
        }

        window.confirmFinish = function() {
            const answered = Object.keys(state.answers).length;
            if (answered < hari5_data.length) {
                if(!confirm(`Ada soal yang belum dijawab (${answered}/${hari5_data.length}). Yakin ingin mengumpulkan sekarang?`)) {
                    return;
                }
            } else {
                if(!confirm("Kumpulkan dan lihat hasil akhir?")) return;
            }
            finishQuiz();
        };

        window.finishQuiz = function() {
            state.isFinished = true;
            clearInterval(timerInterval);
            saveState();
            renderResult();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function renderResult() {
            const result = calculateScore();
            const answeredCount = Object.keys(state.answers).length;
            const unanswered = hari5_data.length - answeredCount;
            
            let grade = '不合格 (F)';
            let gradeColor = 'text-danger';
            let icon = 'fa-times-circle';
            
            if (result.total >= 20) { grade = '秀 (A+)'; gradeColor = 'text-success'; icon = 'fa-crown text-warning'; }
            else if (result.total >= 15) { grade = '優 (A)'; gradeColor = 'text-primary'; icon = 'fa-medal text-primary'; }
            else if (result.total >= 10) { grade = '良 (B)'; gradeColor = 'text-info'; icon = 'fa-thumbs-up text-info'; }
            else if (result.total >= 5) { grade = '可 (C)'; gradeColor = 'text-warning'; icon = 'fa-check text-warning'; }
            else if (result.total >= 0) { grade = '不可 (D)'; gradeColor = 'text-danger'; icon = 'fa-exclamation-triangle text-danger'; }

            let html = `
                <div class="card card-exam border-0 mb-5 text-center overflow-hidden">
                    <div class="bg-primary text-white py-4 shadow-sm">
                        <h2 class="fw-bold m-0"><i class="fas fa-poll me-2"></i> Hasil Simulasi N1 - 第5週</h2>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <i class="fas ${icon} fa-5x mb-3 drop-shadow"></i>
                        <h1 class="display-3 fw-bold mb-1 ${gradeColor}">${grade}</h1>
                        <h4 class="mb-4 text-muted fw-bold">Skor Anda: <span class="${gradeColor}">${result.total}</span> / 25</h4>
                        
                        <div class="row justify-content-center mb-5 g-3">
                            <div class="col-4 col-md-3">
                                <div class="bg-success text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-check-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Benar</h6>
                                    <h3 class="m-0 fw-bold">${result.correct}</h3>
                                </div>
                            </div>
                            <div class="col-4 col-md-3">
                                <div class="bg-danger text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-times-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Salah</h6>
                                    <h3 class="m-0 fw-bold">${result.wrong}</h3>
                                </div>
                            </div>
                            <div class="col-4 col-md-3">
                                <div class="bg-secondary text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-minus-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Kosong</h6>
                                    <h3 class="m-0 fw-bold">${unanswered}</h3>
                                </div>
                            </div>
                        </div>

                        <button onclick="resetSession()" class="btn btn-outline-primary btn-lg px-5 rounded-pill shadow-sm fw-bold">
                            <i class="fas fa-redo-alt me-2"></i> Ulangi Simulasi
                        </button>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4 border-bottom border-primary border-2 pb-2">
                    <i class="fas fa-list-check fa-2x me-3 text-primary"></i>
                    <h3 class="fw-bold m-0 text-primary">Evaluasi Detail</h3>
                </div>
            `;

            hari5_data.forEach((q, index) => {
                const userAnswer = state.answers[q.id];
                const isCorrect = userAnswer === q.answer;
                const isUnanswered = userAnswer === undefined;
                
                let borderClass = isUnanswered ? 'border-secondary' : (isCorrect ? 'border-success' : 'border-danger');
                let badgeStatus = isUnanswered 
                    ? '<span class="badge bg-secondary rounded-pill px-3"><i class="fas fa-minus me-1"></i> Kosong</span>' 
                    : (isCorrect ? '<span class="badge bg-success rounded-pill px-3"><i class="fas fa-check me-1"></i> Benar</span>' : '<span class="badge bg-danger rounded-pill px-3"><i class="fas fa-times me-1"></i> Salah</span>');

                html += `
                    <div class="card card-exam mb-4 shadow-sm border-0" style="border-left: 6px solid ${isUnanswered ? '#6c757d' : (isCorrect ? '#198754' : '#dc3545')} !important; border-top: none;">
                        <div class="card-body p-4">
                            <h5 class="mb-3 lh-base">
                                ${badgeStatus} <span class="ms-2 fw-bold text-muted">No. ${index + 1}</span>
                            </h5>
                            <h5 class="fw-bold mb-4">${q.text}</h5>
                            
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="p-3 rounded-4 bg-light text-dark h-100 ${!isUnanswered && !isCorrect ? 'border border-danger border-2' : 'border border-light'}">
                                        <small class="text-muted d-block mb-2 fw-bold"><i class="fas fa-user-edit me-1"></i> Jawaban Anda:</small>
                                        <strong class="${isCorrect ? 'text-success' : (!isUnanswered ? 'text-danger' : 'text-muted')} fs-6">
                                            ${isUnanswered ? '<em>Tidak dijawab</em>' : (userAnswer + 1) + '. ' + q.options[userAnswer]}
                                        </strong>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="p-3 rounded-4 bg-light text-dark h-100 border border-success border-2" style="background-color: rgba(25,135,84,0.05) !important;">
                                        <small class="text-success d-block mb-2 fw-bold"><i class="fas fa-key me-1"></i> Kunci Jawaban:</small>
                                        <strong class="text-success fs-6">
                                            ${(q.answer + 1)}. ${q.options[q.answer]}
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <div class="explanation-box p-3 rounded-3">
                                <span class="badge bg-primary mb-2">解説 (Penjelasan)</span>
                                <div class="lh-lg small">${q.explanation}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `<div class="mb-5 pb-5"></div>`;
            app.innerHTML = html;
        }

        // --- 4. INIT ---
        if (state.mode && !state.isFinished) {
            if (state.mode === 'asli' && !timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderQuiz();
        } else if (state.isFinished) {
            renderResult();
        } else {
            renderHome();
        }
    </script>
</body>
</html>
