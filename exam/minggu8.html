<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N1 Simulator - Minggu 8</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Warna Merah Khas JLPT */
            --jlpt-red: #e60012;
            --jlpt-red-dark: #b3000e;
            --jlpt-red-light: #ffe5e6;
            --transition-speed: 0.3s;
        }

        body {
            /* Motif Jepang Halus di Background */
            background-color: #f4f6f9;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e60012' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            transition: background-color var(--transition-speed), color var(--transition-speed);
            font-family: 'Noto Sans JP', 'Segoe UI', Tahoma, sans-serif;
        }

        /* Override Bootstrap Primary Color dengan JLPT Red */
        .text-primary { color: var(--jlpt-red) !important; }
        .bg-primary { background-color: var(--jlpt-red) !important; }
        .border-primary { border-color: var(--jlpt-red) !important; }
        
        .btn-primary {
            background-color: var(--jlpt-red);
            border-color: var(--jlpt-red);
            color: white;
            box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
        }
        .btn-primary:hover {
            background-color: var(--jlpt-red-dark);
            border-color: var(--jlpt-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(230, 0, 18, 0.4);
        }
        
        .btn-outline-primary {
            color: var(--jlpt-red);
            border-color: var(--jlpt-red);
        }
        .btn-outline-primary:hover {
            background-color: var(--jlpt-red);
            color: white;
        }

        /* Styling Kartu */
        .card-exam {
            border: none;
            border-radius: 16px;
            border-top: 6px solid var(--jlpt-red);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
        }

        [data-bs-theme="dark"] body {
            background-color: #121212;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        [data-bs-theme="dark"] .card-exam {
            background-color: #1e1e1e;
            border-top: 6px solid var(--jlpt-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Tombol Opsi Jawaban */
        .btn-option {
            border-radius: 12px;
            border-width: 2px;
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
            font-size: 1.05rem;
            color: inherit;
            background-color: transparent;
            border-color: #dee2e6;
        }

        [data-bs-theme="dark"] .btn-option { border-color: #444; color: #f8f9fa; }

        .btn-option:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--jlpt-red);
            background-color: var(--jlpt-red-light);
            color: #333;
        }
        [data-bs-theme="dark"] .btn-option:hover:not(:disabled) {
            background-color: rgba(230, 0, 18, 0.2);
            color: #fff;
        }

        /* Kustomisasi Mode Terpilih (Mode Asli) */
        .btn-selected {
            background-color: var(--jlpt-red) !important;
            color: white !important;
            border-color: var(--jlpt-red) !important;
            box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
        }

        /* Nomor Opsi pada Tombol */
        .opt-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #e9ecef;
            color: #495057;
            font-weight: bold;
            margin-right: 12px;
            transition: all 0.3s ease;
        }
        [data-bs-theme="dark"] .opt-number { background-color: #333; color: #fff; }
        .btn-selected .opt-number, .btn-success .opt-number, .btn-danger .opt-number {
            background-color: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }

        /* Animasi Benar/Salah */
        @keyframes pulse-success {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.7); }
            50% { transform: scale(1.03); background-color: #198754; color: white; box-shadow: 0 0 0 10px rgba(25, 135, 84, 0); }
            100% { transform: scale(1); background-color: #198754; color: white; border-color: #198754; }
        }

        @keyframes shake-error {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
            50% { background-color: #dc3545; color: white; }
            100% { background-color: #dc3545; color: white; border-color: #dc3545; }
        }

        .animate-correct { animation: pulse-success 0.5s ease-out forwards; }
        .animate-wrong { animation: shake-error 0.5s ease-in-out forwards; }

        /* Timer Pulse */
        @keyframes pulse-danger {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .timer-warning { animation: pulse-danger 1s infinite; background-color: #dc3545 !important; }

        /* Theme Switcher Widget */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bs-body-bg);
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid var(--jlpt-red);
        }

        .btn-theme {
            border-radius: 50%;
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--bs-body-color);
            transition: all 0.3s;
        }

        .btn-theme.active {
            background: var(--jlpt-red);
            color: white;
            box-shadow: 0 2px 8px rgba(230, 0, 18, 0.4);
        }
        
        .explanation-box {
            border-left: 5px solid var(--jlpt-red);
            background-color: var(--jlpt-red-light);
            border-radius: 0 12px 12px 0;
            color: #333;
        }
        [data-bs-theme="dark"] .explanation-box {
            background-color: rgba(230, 0, 18, 0.1);
            color: #eee;
        }

        .explanation-list li { margin-bottom: 6px; }
        .soal-text { font-size: 1.25rem; font-weight: 700; color: inherit; }
        .badge-soal { background-color: var(--jlpt-red); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="theme-switcher d-flex gap-1">
        <button class="btn-theme" id="btn-theme-light" onclick="setTheme('light')" title="Light Mode">
            <i class="fas fa-sun"></i>
        </button>
        <button class="btn-theme" id="btn-theme-dark" onclick="setTheme('dark')" title="Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
        <button class="btn-theme" id="btn-theme-system" onclick="setTheme('system')" title="System Theme">
            <i class="fas fa-desktop"></i>
        </button>
    </div>

    <div class="container py-5" id="app">
        </div>

    <script>
        const hari8_data = [
            { id: 1, text: "このパソコンは（  ）が遅い。", options: ["アクセス", "アップ", "ネック", "アピール"], answer: 0, explanation: "Konteks: Waktu akses (koneksi) komputer ini lambat.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. アクセス:</strong> Tepat. Akses/koneksi (access).</li><li><strong>2. アップ:</strong> Naik/Meningkat (up).</li><li><strong>3. ネック:</strong> Hambatan (bottleneck).</li><li><strong>4. アピール:</strong> Daya tarik/menarik perhatian (appeal).</li></ul>" },
            { id: 2, text: "クラスの代表に（  ）された。", options: ["ファイト", "マーク", "エントリー", "ピックアップ"], answer: 3, explanation: "Konteks: Dipilih sebagai perwakilan kelas.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. ファイト:</strong> Semangat/Bertarung (fight).</li><li><strong>2. マーク:</strong> Ditandai / diawasi (mark).</li><li><strong>3. エントリー:</strong> Mendaftar (entry).</li><li><strong>4. ピックアップ:</strong> Tepat. Dipilih / dijemput (picked up).</li></ul>" },
            { id: 3, text: "今日は体調が（  ）しない。", options: ["さっと", "ぱっと", "どっと", "ぐっと"], answer: 1, explanation: "Konteks: Hari ini kondisi badan terasa kurang enak / tidak prima.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. さっと:</strong> Dengan cepat.</li><li><strong>2. ぱっと:</strong> Tepat. 「ぱっとしない」 berarti tidak terlihat bagus, kurang enak, atau tidak memuaskan.</li><li><strong>3. どっと:</strong> Berbondong-bondong / tumpah ruah.</li><li><strong>4. ぐっと:</strong> Jauh lebih (baik) / tertegun.</li></ul>" },
            { id: 4, text: "彼女は（  ）うれしそうな顔をした。", options: ["さっと", "ちらっと", "にやっと", "くるりと"], answer: 2, explanation: "Konteks: Dia tersenyum menyeringai dengan wajah yang terlihat senang.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. さっと:</strong> Tiba-tiba/dengan cepat.</li><li><strong>2. ちらっと:</strong> Sekilas (biasanya untuk melihat: ちらっと見る).</li><li><strong>3. にやっと:</strong> Tepat. Tersenyum menyeringai (grinned/smirked).</li><li><strong>4. くるりと:</strong> Berbalik memutar (berputar 180 derajat).</li></ul>" },
            { id: 5, text: "（  ）お礼を申しあげます。", options: ["つくづく", "謹んで", "切に", "しきりに"], answer: 1, explanation: "Konteks: Saya mengucapkan terima kasih dengan penuh rasa hormat.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. つくづく:</strong> Sangat dalam / sungguh-sungguh (merasakan).</li><li><strong>2. 謹んで (つつしんで):</strong> Tepat. Dengan rendah hati / dengan hormat (biasanya untuk salam formal).</li><li><strong>3. 切に (せつに):</strong> Dengan sungguh-sungguh (berharap).</li><li><strong>4. しきりに:</strong> Berulang kali / sering.</li></ul>" },
            { id: 6, text: "彼は（  ）怒りっぽい。", options: ["むやみに", "やけに", "しきりに", "てっきり"], answer: 1, explanation: "Konteks: Dia menjadi anehnya / sangat mudah marah.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. むやみに:</strong> Secara sembarangan / membabi buta.</li><li><strong>2. やけに:</strong> Tepat. Sangat / amat (awfully). Biasanya digunakan saat suatu kondisi terasa tidak normal (misal: やけに怒りっぽい = anehnya sangat mudah marah).</li><li><strong>3. しきりに:</strong> Terus menerus.</li><li><strong>4. てっきり:</strong> Pasti (dugaan yang ternyata salah).</li></ul>" },
            { id: 7, text: "その事故を見て、（  ）した。", options: ["はらはら", "ぞっと", "むかむか", "いらいら"], answer: 1, explanation: "Konteks: Melihat kecelakaan itu, saya merinding / bergidik ngeri.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. はらはら:</strong> Cemas berdebar-debar (takut akan sesuatu).</li><li><strong>2. ぞっと:</strong> Tepat. Bergidik / merinding ketakutan.</li><li><strong>3. むかむか:</strong> Mual / kesal.</li><li><strong>4. いらいら:</strong> Kesal / jengkel (impatient).</li></ul>" },
            { id: 8, text: "郊外には自然が残り、子供が（  ）遊んでいる。", options: ["がらりと", "ちらほら", "ぶらぶら", "のびのび"], answer: 3, explanation: "Konteks: Di pinggiran kota alamnya masih terjaga, anak-anak bermain dengan bebas dan leluasa.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. がらりと:</strong> Berubah total.</li><li><strong>2. ちらほら:</strong> Tersebar sedikit-sedikit.</li><li><strong>3. ぶらぶら:</strong> Berkeliaran tanpa tujuan (strolling).</li><li><strong>4. のびのび:</strong> Tepat. Bebas leluasa / tanpa tekanan (freely).</li></ul>" },
            { id: 9, text: "この服は（  ）大きすぎる。", options: ["ぐっと", "ちょくちょく", "いささか", "ことに"], answer: 2, explanation: "Konteks: Pakaian ini rasanya agak (sedikit) kebesaran.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. ぐっと:</strong> Jauh lebih / sangat.</li><li><strong>2. ちょくちょく:</strong> Kerap kali / sering.</li><li><strong>3. いささか:</strong> Tepat. Agak / sedikit (somewhat).</li><li><strong>4. ことに:</strong> Khususnya.</li></ul>" },
            { id: 10, text: "彼は（  ）現れた。", options: ["ふらりと", "ちらほら", "ずらりと", "ぐるぐる"], answer: 0, explanation: "Konteks: Dia tiba-tiba muncul (tanpa tujuan jelas / sekadar mampir).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. ふらりと:</strong> Tepat. Muncul atau mampir tanpa tujuan yang jelas/tiba-tiba.</li><li><strong>2. ちらほら:</strong> Tersebar di sana-sini.</li><li><strong>3. ずらりと:</strong> Berjejer rapi.</li><li><strong>4. ぐるぐる:</strong> Berputar-putar.</li></ul>" },
            { id: 11, text: "【とても上手に】", options: ["まんまと", "まともに", "もろに", "見事に"], answer: 3, explanation: "Makna: Dengan sangat baik / luar biasa sukses.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. まんまと:</strong> Dengan sukses (tapi untuk menipu/memperdaya).</li><li><strong>2. まともに:</strong> Secara wajar / langsung.</li><li><strong>3. もろに:</strong> Secara telak / langsung.</li><li><strong>4. 見事に (みごとに):</strong> Tepat. Splendidly / dengan sangat gemilang.</li></ul>" },
            { id: 12, text: "【前もって】", options: ["あらかじめ", "なにとぞ", "てっきり", "まさか"], answer: 0, explanation: "Makna: Sebelumnya / dari awal (beforehand).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. あらかじめ:</strong> Tepat. Bersinonim dengan 前もって (terlebih dahulu).</li><li><strong>2. なにとぞ:</strong> Mohon / please.</li><li><strong>3. てっきり:</strong> Saya kira (pasti).</li><li><strong>4. まさか:</strong> Mustahil / masa iya.</li></ul>" },
            { id: 13, text: "【ちょうど、あたかも】", options: ["もしかして", "いかにも", "まさに", "どうやら"], answer: 2, explanation: "Makna: Persis seperti / benar-benar layaknya.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. もしかして:</strong> Jangan-jangan.</li><li><strong>2. いかにも:</strong> Memang khas (seperti).</li><li><strong>3. まさに:</strong> Tepat. Persis (exactly / just like).</li><li><strong>4. どうやら:</strong> Sepertinya.</li></ul>" },
            { id: 14, text: "【もう一度】", options: ["改めて", "まして", "到底", "かつて"], answer: 0, explanation: "Makna: Sekali lagi / memperbarui.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 改めて (あらためて):</strong> Tepat. Sekali lagi (nanti) / secara formal ulang.</li><li><strong>2. まして:</strong> Apalagi.</li><li><strong>3. 到底 (とうてい):</strong> Sama sekali (tidak mungkin).</li><li><strong>4. かつて:</strong> Dulu / pernah.</li></ul>" },
            { id: 15, text: "【はっきりと】", options: ["かろうじて", "断然", "くっきりと", "強いて"], answer: 2, explanation: "Makna: Dengan jelas / tegas (terlihat batasannya).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. かろうじて:</strong> Nyaris tidak / dengan susah payah.</li><li><strong>2. 断然 (だんぜん):</strong> Pasti / jauh lebih.</li><li><strong>3. くっきりと:</strong> Tepat. Jelas / kentara (distinctly/clearly, misal garis gunung di langit).</li><li><strong>4. 強いて (しいて):</strong> Memaksakan diri.</li></ul>" },
            { id: 16, text: "彼は私の言うことを「まったく」信じていないようだ。", options: ["いっそ", "まるっきり", "さほど", "てっきり"], answer: 1, explanation: "Kata yang bersinonim dengan まったく(～ない) (sama sekali tidak).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. いっそ:</strong> Sekalian saja / lebih baik.</li><li><strong>2. まるっきり:</strong> Tepat. Sama sekali (tidak).</li><li><strong>3. さほど:</strong> Tidak begitu (tidak terlalu).</li><li><strong>4. てっきり:</strong> Kukira (ternyata tidak).</li></ul>" },
            { id: 17, text: "「無理に」とは言いませんが、できればお願いします。", options: ["まして", "強いて", "あえて", "さして"], answer: 1, explanation: "Kata yang bersinonim dengan 無理に (memaksa).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. まして:</strong> Apalagi.</li><li><strong>2. 強いて (しいて):</strong> Tepat. Secara paksa / jika harus dipaksakan.</li><li><strong>3. あえて:</strong> Memberanikan diri / sengaja (melakukan hal sulit).</li><li><strong>4. さして:</strong> Tidak begitu (banyak).</li></ul>" },
            { id: 18, text: "彼女は「しきりに」時計を気にしている。", options: ["やたらと", "むやみに", "何度も", "どうやら"], answer: 2, explanation: "Kata yang bersinonim dengan しきりに (berulang kali / terus menerus).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. やたらと:</strong> Secara berlebihan (tanpa alasan).</li><li><strong>2. むやみに:</strong> Membabi buta / sembarangan.</li><li><strong>3. 何度も:</strong> Tepat. Berkali-kali / berulang-ulang.</li><li><strong>4. どうやら:</strong> Tampaknya.</li></ul>" },
            { id: 19, text: "「どうしても」あの時の失敗が忘れられない。", options: ["なにとぞ", "どうやら", "どうにか", "なかなか"], answer: 3, explanation: "Kata yang bersinonim dengan どうしても(～ない) (sama sekali tidak bisa).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. なにとぞ:</strong> Mohon dengan sangat.</li><li><strong>2. どうやら:</strong> Sepertinya.</li><li><strong>3. どうにか:</strong> Bagaimanapun caranya (bisa terselesaikan).</li><li><strong>4. なかなか:</strong> Tepat. Jika diikuti bentuk negatif berarti 'susah sekali' atau 'sama sekali tidak bisa'.</li></ul>" },
            { id: 20, text: "おじいちゃん、「くれぐれも」お体に気をつけてくださいね。", options: ["切に", "なにとぞ", "どうか", "よくよく"], answer: 2, explanation: "Kata yang bersinonim dengan くれぐれも (tolong dengan amat sangat / sungguh-sungguh memohon).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 切に (せつに):</strong> Berharap dengan tulus.</li><li><strong>2. なにとぞ:</strong> Formal sekali untuk memohon (please do).</li><li><strong>3. どうか:</strong> Tepat. Tolong / please (bersinonim saat memberikan pesan permohonan ke orang lain).</li><li><strong>4. よくよく:</strong> Benar-benar / sangat.</li></ul>" },
            { id: 21, text: "フォロー", options: ["授業に「フォロー」して、遅刻した。", "社長の話を「フォロー」して、ノートに書いた。", "彼の失敗をみんなで「フォロー」した。", "ルールを「フォロー」して、ゲームをした。"], answer: 2, explanation: "Penggunaan yang tepat untuk フォロー (follow up / menutupi kesalahan orang lain / mendukung).<br>Opsi 3 paling tepat: 'Kami semua membantu (meng-cover) kesalahannya.' <br>Opsi 1 salah (seharusnya 遅れて). Opsi 2 salah (seharusnya メモして). Opsi 4 salah (seharusnya 守って)." },
            { id: 22, text: "どうやら", options: ["「どうやら」明日は雨になりそうだ。", "彼は「どうやら」遅刻して、怒られた。", "「どうやら」してこの問題を解決したい。", "彼の言うことは「どうやら」うそではない。"], answer: 0, explanation: "Penggunaan yang tepat untuk どうやら (sepertinya / tampaknya).<br>Opsi 1 paling tepat: 'Sepertinya besok akan hujan.' <br>Opsi 2 salah (seharusnya またしても). Opsi 3 salah (seharusnya どうにか). Opsi 4 salah (seharusnya まったく)." },
            { id: 23, text: "つくづく", options: ["彼は「つくづく」自分の失敗を反省した。", "「つくづく」考えてから、返事します。", "このごろ「つくづく」自分が嫌になる。", "「つくづく」見ると、きれいな絵だ。"], answer: 2, explanation: "Penggunaan yang tepat untuk つくづく (sangat dalam / keen feeling, biasanya tentang diri sendiri/nasib).<br>Opsi 3 paling tepat: 'Akhir-akhir ini, aku sangat membenci diriku sendiri.' <br>Opsi 1 salah (深く反省した). Opsi 2 salah (じっくり). Opsi 4 salah (よくよく / じっと)." },
            { id: 24, text: "断然 (だんぜん)", options: ["彼は「断然」その誘いを断った。", "このケーキのほうが「断然」おいしい。", "彼は「断然」怒っている。", "その話は「断然」うそだ。"], answer: 1, explanation: "Penggunaan yang tepat untuk 断然 (jauh lebih / by far, digunakan saat membandingkan dan menyatakan satu hal mutlak lebih superior).<br>Opsi 2 paling tepat: 'Kue yang ini jelas (jauh lebih) enak.'<br>Opsi 1 salah (きっぱり). Opsi 3 salah (ものすごく). Opsi 4 salah (絶対に)." },
            { id: 25, text: "ルーズ", options: ["彼は時間に「ルーズ」だ。", "靴のひもが「ルーズ」になっている。", "このシャツは少し「ルーズ」だ。", "「ルーズ」な道を歩くのは疲れる。"], answer: 0, explanation: "Penggunaan yang tepat untuk ルーズ (sloppy / tidak disiplin / ceroboh soal aturan, waktu, uang).<br>Opsi 1 paling tepat: 'Dia orangnya tidak disiplin soal waktu (suka telat).' <br>Opsi 2 salah (ゆるく). Opsi 3 salah (ゆるい). Opsi 4 salah (険しい/悪い)." }
        ];
    </script>

    <script>
        // --- 1. THEME MANAGEMENT ---
        function getSavedTheme() {
            return localStorage.getItem('jlpt_theme') || 'system';
        }

        function setTheme(theme) {
            localStorage.setItem('jlpt_theme', theme);
            
            document.querySelectorAll('.btn-theme').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-theme-${theme}`).classList.add('active');

            if (theme === 'system') {
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-bs-theme', systemPrefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-bs-theme', theme);
            }
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (getSavedTheme() === 'system') setTheme('system');
        });

        setTheme(getSavedTheme());

        // --- 2. STATE MANAGEMENT ---
        let state = JSON.parse(sessionStorage.getItem('jlpt_session_minggu8')) || {
            mode: null,          
            answers: {},         
            timeRemaining: 900,  
            isFinished: false,
            lastClicked: null    
        };
        let timerInterval;

        const saveState = () => sessionStorage.setItem('jlpt_session_minggu8', JSON.stringify(state));

        const resetSession = () => {
            if(confirm("Yakin ingin keluar? Riwayat ujian saat ini akan terhapus.")) {
                state = { mode: null, answers: {}, timeRemaining: 900, isFinished: false, lastClicked: null };
                saveState();
                clearInterval(timerInterval);
                renderHome();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        const returnToIndex = () => {
            window.location.href = "../index.html";
        };

        const app = document.getElementById('app');

        // --- 3. RENDERING ENGINE ---
        function renderHome() {
            app.innerHTML = `
                <div class="card card-exam mx-auto" style="max-width: 650px;">
                    <div class="card-body text-center p-4 p-md-5">
                        <div class="mb-4 text-primary">
                            <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary text-white mb-3 shadow" style="width: 80px; height: 80px;">
                                <i class="fas fa-torii-gate fa-2x"></i>
                            </div>
                            <h1 class="display-6 fw-bold mb-1" style="letter-spacing: -1px;">日本語能力試験 <span class="text-dark" data-bs-theme="dark" style="color: inherit;">N1</span></h1>
                        </div>
                        <h5 class="text-secondary mb-4 fw-bold">SOU MATOME - 第8週 まとめて覚えよう②</h5>
                        <p class="mb-4 text-muted">Silakan pilih mode simulasi. <br class="d-none d-md-block">Uji kemampuan penguasaan kata sifat/keterangan ganda Anda sekarang.</p>
                        
                        <div class="d-grid gap-3 mb-4">
                            <button onclick="startQuiz('asli')" class="btn btn-outline-primary btn-lg p-3 p-md-4 text-start position-relative shadow-sm rounded-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3 me-md-4 shadow" style="min-width: 50px; height: 50px;">
                                        <i class="fas fa-file-signature fa-lg"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">Mode Ujian Asli (本試験)</h5>
                                        <small style="font-size: 0.85rem;">15 Menit | Bisa perbaiki jawaban | Evaluasi Akhir</small>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startQuiz('latihan')" class="btn btn-outline-success btn-lg p-3 p-md-4 text-start position-relative shadow-sm rounded-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-3 me-md-4 shadow" style="min-width: 50px; height: 50px;">
                                        <i class="fas fa-book-reader fa-lg"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">Mode Latihan (練習)</h5>
                                        <small style="font-size: 0.85rem;">Santai | Langsung cek benar/salah & penjelasan</small>
                                    </div>
                                </div>
                            </button>
                        </div>
                        
                        <hr class="my-4">
                        <button onclick="returnToIndex()" class="btn btn-light border w-100 fw-bold rounded-pill text-muted">
                            <i class="fas fa-arrow-left me-2"></i> Kembali ke Menu Utama (.index.html)
                        </button>
                    </div>
                </div>
            `;
        }

        function startQuiz(mode) {
            state.mode = mode;
            state.isFinished = false;
            state.lastClicked = null;
            saveState();
            
            if (mode === 'asli' && !timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateTimer() {
            if (state.timeRemaining <= 0) {
                clearInterval(timerInterval);
                alert("Waktu Habis! Ujian otomatis dikumpulkan.");
                finishQuiz();
                return;
            }
            state.timeRemaining--;
            saveState();
            
            const timerEl = document.getElementById('timer-display');
            if (timerEl) {
                const m = Math.floor(state.timeRemaining / 60).toString().padStart(2, '0');
                const s = (state.timeRemaining % 60).toString().padStart(2, '0');
                
                if (state.timeRemaining < 180) { // Kurang dari 3 menit
                    timerEl.classList.remove('bg-primary');
                    timerEl.classList.add('timer-warning');
                }
                timerEl.innerHTML = `<i class="fas fa-stopwatch me-1"></i> ${m}:${s}`;
            }
        }

        window.selectOption = function(qId, optIndex) {
            if (state.isFinished) return;
            
            const isCorrect = hari8_data.find(q => q.id === qId).answer === optIndex;
            
            state.answers[qId] = optIndex;
            state.lastClicked = { qId, optIndex, isCorrect }; 
            
            saveState();
            renderQuiz();
        };

        function renderQuiz() {
            if (state.isFinished) return renderResult();

            let scoreLatihan = calculateScore();
            let totalAnswered = Object.keys(state.answers).length;
            let progress = (totalAnswered / hari8_data.length) * 100;

            let html = `
                <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4 sticky-top bg-body pt-3 pb-2 z-3" style="margin-top:-20px;">
                    <button onclick="resetSession()" class="btn btn-outline-secondary rounded-pill shadow-sm">
                        <i class="fas fa-times me-1"></i> Batal
                    </button>
                    ${state.mode === 'asli' 
                        ? `<span class="badge bg-primary fs-5 shadow px-3 py-2 rounded-pill" id="timer-display">
                            <i class="fas fa-stopwatch me-1"></i> ${Math.floor(state.timeRemaining / 60).toString().padStart(2, '0')}:${(state.timeRemaining % 60).toString().padStart(2, '0')}
                           </span>`
                        : `<span class="badge bg-success fs-5 shadow px-3 py-2 rounded-pill"><i class="fas fa-star me-1 text-warning"></i> Skor: ${scoreLatihan.total}</span>`
                    }
                </div>

                <div class="card card-exam mb-4 border-0">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-3 ${state.mode === 'asli' ? 'text-primary' : 'text-success'}">
                            <i class="${state.mode === 'asli' ? 'fas fa-pen-nib' : 'fas fa-dumbbell'} me-2"></i>
                            ${state.mode === 'asli' ? '本試験 (Ujian Asli) - 第8週' : '練習 (Mode Latihan) - 第8週'}
                        </h4>
                        <div class="progress" style="height: 12px; border-radius: 10px; background-color: var(--bs-secondary-bg);">
                            <div class="progress-bar progress-bar-striped progress-bar-animated ${state.mode === 'asli' ? 'bg-primary' : 'bg-success'}" 
                                 style="width: ${progress}%"></div>
                        </div>
                        <div class="text-end mt-2 fw-bold text-muted small">${totalAnswered} / ${hari8_data.length} Terjawab</div>
                    </div>
                </div>
            `;

            hari8_data.forEach((q, index) => {
                const userAnswer = state.answers[q.id];
                html += `
                    <div class="card card-exam mb-4" id="q${q.id}">
                        <div class="card-body p-3 p-md-4">
                            <div class="d-flex align-items-start mb-4">
                                <span class="badge badge-soal rounded-pill me-3 shadow-sm py-2 px-3">${index + 1}</span> 
                                <span class="soal-text lh-base">${q.text}</span>
                            </div>
                            <div class="row g-3 ms-md-4">
                `;

                q.options.forEach((opt, oIndex) => {
                    let btnClass = '';
                    let animateClass = '';
                    
                    if (state.mode === 'asli') {
                        if (userAnswer === oIndex) btnClass = 'btn-selected'; 
                    } else if (state.mode === 'latihan') {
                        if (userAnswer === oIndex) {
                            btnClass = (oIndex === q.answer) ? 'btn-success text-white' : 'btn-danger text-white';
                        } else if (userAnswer !== undefined && oIndex === q.answer) {
                            btnClass = 'border-success text-success fw-bold bg-success bg-opacity-10';
                        }
                    }

                    if (state.lastClicked && state.lastClicked.qId === q.id && state.lastClicked.optIndex === oIndex && state.mode === 'latihan') {
                        animateClass = state.lastClicked.isCorrect ? 'animate-correct' : 'animate-wrong';
                    }

                    html += `
                        <div class="col-12 col-md-6 d-grid">
                            <button onclick="selectOption(${q.id}, ${oIndex})" 
                                    class="btn btn-option border p-3 d-flex align-items-center ${btnClass} ${animateClass}">
                                <span class="opt-number shadow-sm">${oIndex + 1}</span>
                                <span>${opt}</span>
                            </button>
                        </div>
                    `;
                });

                if (state.mode === 'latihan' && userAnswer !== undefined) {
                    const isCorrect = userAnswer === q.answer;
                    html += `
                        <div class="col-12 mt-4 ms-md-4 w-auto">
                            <div class="p-3 explanation-box shadow-sm">
                                <h6 class="${isCorrect ? 'text-success' : 'text-danger'} fw-bold mb-2">
                                    <i class="${isCorrect ? 'fas fa-check-circle' : 'fas fa-times-circle'} me-1"></i>
                                    ${isCorrect ? 'Jawaban Tepat!' : 'Jawaban Kurang Tepat.'}
                                </h6>
                                <div class="small lh-lg">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `</div></div></div>`;
            });

            html += `
                <div class="text-center mt-5 mb-5 pb-5">
                    <button onclick="confirmFinish()" class="btn btn-primary btn-lg px-5 py-3 rounded-pill shadow fw-bold fs-5">
                        <i class="fas fa-paper-plane me-2"></i> Kumpulkan Ujian
                    </button>
                </div>
            `;

            app.innerHTML = html;
        }

        function calculateScore() {
            let correct = 0, wrong = 0;
            for (let qId in state.answers) {
                const q = hari8_data.find(x => x.id == qId);
                if (state.answers[qId] === q.answer) correct++;
                else wrong++;
            }
            return { correct, wrong, total: correct - wrong }; 
        }

        window.confirmFinish = function() {
            const answered = Object.keys(state.answers).length;
            if (answered < hari8_data.length) {
                if(!confirm(`Ada soal yang belum dijawab (${answered}/${hari8_data.length}). Yakin ingin mengumpulkan sekarang?`)) {
                    return;
                }
            } else {
                if(!confirm("Kumpulkan dan lihat hasil akhir?")) return;
            }
            finishQuiz();
        };

        window.finishQuiz = function() {
            state.isFinished = true;
            clearInterval(timerInterval);
            saveState();
            renderResult();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function renderResult() {
            const result = calculateScore();
            const answeredCount = Object.keys(state.answers).length;
            const unanswered = hari8_data.length - answeredCount;
            
            let grade = '不合格 (F)';
            let gradeColor = 'text-danger';
            let icon = 'fa-times-circle';
            
            if (result.total >= 20) { grade = '秀 (A+)'; gradeColor = 'text-success'; icon = 'fa-crown text-warning'; }
            else if (result.total >= 15) { grade = '優 (A)'; gradeColor = 'text-primary'; icon = 'fa-medal text-primary'; }
            else if (result.total >= 10) { grade = '良 (B)'; gradeColor = 'text-info'; icon = 'fa-thumbs-up text-info'; }
            else if (result.total >= 5) { grade = '可 (C)'; gradeColor = 'text-warning'; icon = 'fa-check text-warning'; }
            else if (result.total >= 0) { grade = '不可 (D)'; gradeColor = 'text-danger'; icon = 'fa-exclamation-triangle text-danger'; }

            let html = `
                <div class="card card-exam border-0 mb-5 text-center overflow-hidden">
                    <div class="bg-primary text-white py-4 shadow-sm">
                        <h2 class="fw-bold m-0"><i class="fas fa-poll me-2"></i> Hasil Simulasi N1 - 第8週</h2>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <i class="fas ${icon} fa-5x mb-3 drop-shadow"></i>
                        <h1 class="display-3 fw-bold mb-1 ${gradeColor}">${grade}</h1>
                        <h4 class="mb-4 text-muted fw-bold">Skor Anda: <span class="${gradeColor}">${result.total}</span> / 25</h4>
                        
                        <div class="row justify-content-center mb-5 g-3">
                            <div class="col-4 col-md-3">
                                <div class="bg-success text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-check-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Benar</h6>
                                    <h3 class="m-0 fw-bold">${result.correct}</h3>
                                </div>
                            </div>
                            <div class="col-4 col-md-3">
                                <div class="bg-danger text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-times-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Salah</h6>
                                    <h3 class="m-0 fw-bold">${result.wrong}</h3>
                                </div>
                            </div>
                            <div class="col-4 col-md-3">
                                <div class="bg-secondary text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-minus-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Kosong</h6>
                                    <h3 class="m-0 fw-bold">${unanswered}</h3>
                                </div>
                            </div>
                        </div>

                        <button onclick="resetSession()" class="btn btn-outline-primary btn-lg px-5 rounded-pill shadow-sm fw-bold">
                            <i class="fas fa-redo-alt me-2"></i> Ulangi Simulasi
                        </button>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4 border-bottom border-primary border-2 pb-2">
                    <i class="fas fa-list-check fa-2x me-3 text-primary"></i>
                    <h3 class="fw-bold m-0 text-primary">Evaluasi Detail</h3>
                </div>
            `;

            hari8_data.forEach((q, index) => {
                const userAnswer = state.answers[q.id];
                const isCorrect = userAnswer === q.answer;
                const isUnanswered = userAnswer === undefined;
                
                let borderClass = isUnanswered ? 'border-secondary' : (isCorrect ? 'border-success' : 'border-danger');
                let badgeStatus = isUnanswered 
                    ? '<span class="badge bg-secondary rounded-pill px-3"><i class="fas fa-minus me-1"></i> Kosong</span>' 
                    : (isCorrect ? '<span class="badge bg-success rounded-pill px-3"><i class="fas fa-check me-1"></i> Benar</span>' : '<span class="badge bg-danger rounded-pill px-3"><i class="fas fa-times me-1"></i> Salah</span>');

                html += `
                    <div class="card card-exam mb-4 shadow-sm border-0" style="border-left: 6px solid ${isUnanswered ? '#6c757d' : (isCorrect ? '#198754' : '#dc3545')} !important; border-top: none;">
                        <div class="card-body p-4">
                            <h5 class="mb-3 lh-base">
                                ${badgeStatus} <span class="ms-2 fw-bold text-muted">No. ${index + 1}</span>
                            </h5>
                            <h5 class="fw-bold mb-4">${q.text}</h5>
                            
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="p-3 rounded-4 bg-light text-dark h-100 ${!isUnanswered && !isCorrect ? 'border border-danger border-2' : 'border border-light'}">
                                        <small class="text-muted d-block mb-2 fw-bold"><i class="fas fa-user-edit me-1"></i> Jawaban Anda:</small>
                                        <strong class="${isCorrect ? 'text-success' : (!isUnanswered ? 'text-danger' : 'text-muted')} fs-6">
                                            ${isUnanswered ? '<em>Tidak dijawab</em>' : (userAnswer + 1) + '. ' + q.options[userAnswer]}
                                        </strong>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="p-3 rounded-4 bg-light text-dark h-100 border border-success border-2" style="background-color: rgba(25,135,84,0.05) !important;">
                                        <small class="text-success d-block mb-2 fw-bold"><i class="fas fa-key me-1"></i> Kunci Jawaban:</small>
                                        <strong class="text-success fs-6">
                                            ${(q.answer + 1)}. ${q.options[q.answer]}
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <div class="explanation-box p-3 rounded-3">
                                <span class="badge bg-primary mb-2">解説 (Penjelasan)</span>
                                <div class="lh-lg small">${q.explanation}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `<div class="mb-5 pb-5"></div>`;
            app.innerHTML = html;
        }

        // --- 4. INIT ---
        if (state.mode && !state.isFinished) {
            if (state.mode === 'asli' && !timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderQuiz();
        } else if (state.isFinished) {
            renderResult();
        } else {
            renderHome();
        }
    </script>
</body>
</html>
