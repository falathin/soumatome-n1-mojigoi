<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N1 Simulator - Minggu 6</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Warna Merah Khas JLPT */
            --jlpt-red: #e60012;
            --jlpt-red-dark: #b3000e;
            --jlpt-red-light: #ffe5e6;
            --transition-speed: 0.3s;
        }

        body {
            /* Motif Jepang Halus di Background */
            background-color: #f4f6f9;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e60012' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            transition: background-color var(--transition-speed), color var(--transition-speed);
            font-family: 'Noto Sans JP', 'Segoe UI', Tahoma, sans-serif;
        }

        /* Override Bootstrap Primary Color dengan JLPT Red */
        .text-primary { color: var(--jlpt-red) !important; }
        .bg-primary { background-color: var(--jlpt-red) !important; }
        .border-primary { border-color: var(--jlpt-red) !important; }
        
        .btn-primary {
            background-color: var(--jlpt-red);
            border-color: var(--jlpt-red);
            color: white;
            box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
        }
        .btn-primary:hover {
            background-color: var(--jlpt-red-dark);
            border-color: var(--jlpt-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(230, 0, 18, 0.4);
        }
        
        .btn-outline-primary {
            color: var(--jlpt-red);
            border-color: var(--jlpt-red);
        }
        .btn-outline-primary:hover {
            background-color: var(--jlpt-red);
            color: white;
        }

        /* Styling Kartu */
        .card-exam {
            border: none;
            border-radius: 16px;
            border-top: 6px solid var(--jlpt-red);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
        }

        [data-bs-theme="dark"] body {
            background-color: #121212;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        [data-bs-theme="dark"] .card-exam {
            background-color: #1e1e1e;
            border-top: 6px solid var(--jlpt-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Tombol Opsi Jawaban */
        .btn-option {
            border-radius: 12px;
            border-width: 2px;
            text-align: left;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
            font-size: 1.05rem;
            color: inherit;
            background-color: transparent;
            border-color: #dee2e6;
        }

        [data-bs-theme="dark"] .btn-option { border-color: #444; color: #f8f9fa; }

        .btn-option:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: var(--jlpt-red);
            background-color: var(--jlpt-red-light);
            color: #333;
        }
        [data-bs-theme="dark"] .btn-option:hover:not(:disabled) {
            background-color: rgba(230, 0, 18, 0.2);
            color: #fff;
        }

        /* Kustomisasi Mode Terpilih (Mode Asli) */
        .btn-selected {
            background-color: var(--jlpt-red) !important;
            color: white !important;
            border-color: var(--jlpt-red) !important;
            box-shadow: 0 4px 10px rgba(230, 0, 18, 0.3);
        }

        /* Nomor Opsi pada Tombol */
        .opt-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #e9ecef;
            color: #495057;
            font-weight: bold;
            margin-right: 12px;
            transition: all 0.3s ease;
        }
        [data-bs-theme="dark"] .opt-number { background-color: #333; color: #fff; }
        .btn-selected .opt-number, .btn-success .opt-number, .btn-danger .opt-number {
            background-color: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }

        /* Animasi Benar/Salah */
        @keyframes pulse-success {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.7); }
            50% { transform: scale(1.03); background-color: #198754; color: white; box-shadow: 0 0 0 10px rgba(25, 135, 84, 0); }
            100% { transform: scale(1); background-color: #198754; color: white; border-color: #198754; }
        }

        @keyframes shake-error {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
            50% { background-color: #dc3545; color: white; }
            100% { background-color: #dc3545; color: white; border-color: #dc3545; }
        }

        .animate-correct { animation: pulse-success 0.5s ease-out forwards; }
        .animate-wrong { animation: shake-error 0.5s ease-in-out forwards; }

        /* Timer Pulse */
        @keyframes pulse-danger {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .timer-warning { animation: pulse-danger 1s infinite; background-color: #dc3545 !important; }

        /* Theme Switcher Widget */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bs-body-bg);
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid var(--jlpt-red);
        }

        .btn-theme {
            border-radius: 50%;
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--bs-body-color);
            transition: all 0.3s;
        }

        .btn-theme.active {
            background: var(--jlpt-red);
            color: white;
            box-shadow: 0 2px 8px rgba(230, 0, 18, 0.4);
        }
        
        .explanation-box {
            border-left: 5px solid var(--jlpt-red);
            background-color: var(--jlpt-red-light);
            border-radius: 0 12px 12px 0;
            color: #333;
        }
        [data-bs-theme="dark"] .explanation-box {
            background-color: rgba(230, 0, 18, 0.1);
            color: #eee;
        }

        .explanation-list li { margin-bottom: 6px; }
        .soal-text { font-size: 1.25rem; font-weight: 700; color: inherit; }
        .badge-soal { background-color: var(--jlpt-red); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="theme-switcher d-flex gap-1">
        <button class="btn-theme" id="btn-theme-light" onclick="setTheme('light')" title="Light Mode">
            <i class="fas fa-sun"></i>
        </button>
        <button class="btn-theme" id="btn-theme-dark" onclick="setTheme('dark')" title="Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
        <button class="btn-theme" id="btn-theme-system" onclick="setTheme('system')" title="System Theme">
            <i class="fas fa-desktop"></i>
        </button>
    </div>

    <div class="container py-5" id="app">
        </div>

    <script>
        const hari6_data = [
            { id: 1, text: "彼は芸能界の話題にとても（  ）。", options: ["明るい", "あまい", "かたい", "重い"], answer: 0, explanation: "Konteks: Dia sangat berpengetahuan tentang topik dunia hiburan.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 明るい:</strong> Tepat. 「～に明るい」 artinya berpengetahuan luas / familier dengan suatu topik.</li><li><strong>2. あまい:</strong> Manis / naif / tidak tegas.</li><li><strong>3. かたい:</strong> Keras / teguh.</li><li><strong>4. 重い:</strong> Berat.</li></ul>" },
            { id: 2, text: "彼女は口は悪いけど（  ）はやさしい人ですよ。", options: ["種", "根", "身", "実"], answer: 1, explanation: "Konteks: Mulutnya memang tajam, tapi sifat aslinya baik lho.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 種:</strong> Biji / rahasia trik.</li><li><strong>2. 根 (ね):</strong> Tepat. 「根はやさしい」 artinya sifat aslinya (dari akar/hatinya) adalah baik.</li><li><strong>3. 身:</strong> Tubuh / diri.</li><li><strong>4. 実:</strong> Buah / kenyataan.</li></ul>" },
            { id: 3, text: "息子は頭が少し（  ）。頑固な父親にそっくりだ。", options: ["かたい", "軽い", "あまい", "強い"], answer: 0, explanation: "Konteks: Anakku kepalanya sedikit keras (keras kepala). Persis seperti ayahnya yang keras kepala.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. かたい:</strong> Tepat. 「頭がかたい」 (atama ga katai) berarti keras kepala / kaku pemikirannya.</li><li><strong>2. 軽い:</strong> Ringan.</li><li><strong>3. あまい:</strong> Manis / terlalu longgar.</li><li><strong>4. 強い:</strong> Kuat.</li></ul>" },
            { id: 4, text: "うまい話に（  ）ように気をつけよう。", options: ["受けない", "乗らない", "すべらない", "通らない"], answer: 1, explanation: "Konteks: Berhati-hatilah agar tidak termakan tipuan berkedok keuntungan/cerita manis.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 受けない:</strong> Tidak menerima.</li><li><strong>2. 乗らない:</strong> Tepat. 「話に乗る」 berarti menanggapi / termakan tipuan / ikut-ikutan.</li><li><strong>3. すべらない:</strong> Tidak terpeleset.</li><li><strong>4. 通らない:</strong> Tidak tembus/lewat.</li></ul>" },
            { id: 5, text: "何回も振り込みをすると、手数料が（  ）。", options: ["バカになる", "バカにならない", "バカをみる", "バカをみない"], answer: 1, explanation: "Konteks: Kalau berkali-kali transfer, biaya adminnya jadi jumlah yang tidak bisa diremehkan.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. バカになる:</strong> Menjadi rusak / tidak berfungsi.</li><li><strong>2. バカにならない:</strong> Tepat. Artinya 'tidak bisa diremehkan' atau 'berjumlah lumayan besar'.</li><li><strong>3. バカを見る:</strong> Rugi / mendapati kesialan.</li><li><strong>4. バカをみない:</strong> Tidak rugi.</li></ul>" },
            { id: 6, text: "もう遅いので、後は明日に（  ）今日は帰りましょう。", options: ["つながって", "回して", "引いて", "通して"], answer: 1, explanation: "Konteks: Karena sudah larut, mari kita tinggalkan sisanya untuk besok dan pulang sekarang.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. つながって:</strong> Tersambung.</li><li><strong>2. 回して (まわして):</strong> Tepat. 「明日に回す」 (ashitani mawasu) berarti menunda/menggeser ke hari esok.</li><li><strong>3. 引いて:</strong> Menarik.</li><li><strong>4. 通して:</strong> Melewati / membiarkan lewat.</li></ul>" },
            { id: 7, text: "もう少しスピードを出していたら、大事故に（  ）ところだった。", options: ["回る", "引かれる", "つながる", "結ぶ"], answer: 2, explanation: "Konteks: Jika tadinya aku ngebut sedikit lagi, itu bisa berujung pada kecelakaan besar.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 回る:</strong> Berputar.</li><li><strong>2. 引かれる:</strong> Tertabrak / tertarik.</li><li><strong>3. つながる:</strong> Tepat. Berujung pada / berkaitan dengan (大事故につながる).</li><li><strong>4. 結ぶ:</strong> Mengikat.</li></ul>" },
            { id: 8, text: "妻は、私が昔、浮気をしたことを、いまだに（  ）に持っているようだ。", options: ["根", "気", "頭", "種"], answer: 0, explanation: "Konteks: Istriku sepertinya masih menyimpan dendam soal perselingkuhanku di masa lalu.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 根 (ね):</strong> Tepat. 「根に持つ」 (nenimotsu) adalah idiom yang berarti menaruh dendam / mengingat-ingat kesalahan orang.</li><li><strong>2. 気:</strong> Perasaan/Niat.</li><li><strong>3. 頭:</strong> Kepala.</li><li><strong>4. 種:</strong> Benih/Bibit.</li></ul>" },
            { id: 9, text: "子どもの学費の支払いでボーナスが（  ）しまった。", options: ["送って", "すべって", "結んで", "飛んで"], answer: 3, explanation: "Konteks: Uang bonusku lenyap (terbang) untuk membayar uang sekolah anak.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 送って:</strong> Mengirim.</li><li><strong>2. すべって:</strong> Tergelincir.</li><li><strong>3. 結んで:</strong> Mengikat.</li><li><strong>4. 飛んで:</strong> Tepat. 「ボーナスが飛ぶ」 berarti uang bonus langsung habis / lenyap sekejap.</li></ul>" },
            { id: 10, text: "社長が逮捕されてしまって、とてもショックを（  ）。", options: ["持った", "受けた", "あたった", "得た"], answer: 1, explanation: "Konteks: Presiden direktur ditangkap, dan saya sangat syok.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 持った:</strong> Membawa/Memegang.</li><li><strong>2. 受けた:</strong> Tepat. 「ショックを受ける」 (shokku o ukeru) berarti mengalami syok terkejut.</li><li><strong>3. あたった:</strong> Mengenai/Memenangkan.</li><li><strong>4. 得た:</strong> Mendapatkan (keuntungan/pengetahuan).</li></ul>" },
            { id: 11, text: "【素質がいい。】", options: ["種がいい", "道がいい", "当たりがいい", "筋がいい"], answer: 3, explanation: "Makna: Memiliki bakat / potensi yang bagus.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 種がいい:</strong> Bibitnya bagus.</li><li><strong>2. 道がいい:</strong> Jalannya bagus.</li><li><strong>3. 当たりがいい:</strong> Ramah / perlakuan yang baik.</li><li><strong>4. 筋がいい (すじがいい):</strong> Tepat. Idiom ini berarti memiliki bakat atau potensi alami yang baik terhadap sesuatu.</li></ul>" },
            { id: 12, text: "【方法。】", options: ["道", "筋", "種", "根"], answer: 0, explanation: "Makna: Cara / jalan keluar / metode.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 道 (みち):</strong> Tepat. Dapat diartikan sebagai cara/metode (contoh: 解決の道 = jalan penyelesaian).</li><li><strong>2. 筋:</strong> Alur / logika.</li><li><strong>3. 種:</strong> Trik / benih.</li><li><strong>4. 根:</strong> Akar.</li></ul>" },
            { id: 13, text: "【次々に起こる。】", options: ["後に回す", "後をつぐ", "後をつけない", "後を絶たない"], answer: 3, explanation: "Makna: Terjadi satu demi satu / tidak ada habisnya.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 後に回す:</strong> Menunda.</li><li><strong>2. 後をつぐ:</strong> Mewarisi / meneruskan tahta.</li><li><strong>3. 後をつけない:</strong> Tidak mengikuti.</li><li><strong>4. 後を絶たない (あとをたたない):</strong> Tepat. Sesuatu (seringnya hal buruk) terus terjadi tanpa henti.</li></ul>" },
            { id: 14, text: "【よい結果が表れる。】", options: ["実をつなぐ", "実を結ぶ", "道をつなぐ", "道を結ぶ"], answer: 1, explanation: "Makna: Membuahkan hasil yang baik.<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 実をつなぐ:</strong> Bukan idiom yang tepat.</li><li><strong>2. 実を結ぶ (みをむすぶ):</strong> Tepat. Usaha yang membuahkan hasil (berbuah).</li><li><strong>3. 道をつなぐ:</strong> Menyambung jalan.</li><li><strong>4. 道を結ぶ:</strong> Bukan idiom yang tepat.</li></ul>" },
            { id: 15, text: "【見た目などを実際以上によく見せようとする。】", options: ["胸を張る", "調子に乗る", "人当たりがいい", "見栄を張る"], answer: 3, explanation: "Makna: Berusaha menunjukkan penampilan/gaya hidup lebih baik dari aslinya (gengsi).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 胸を張る:</strong> Membusungkan dada (bangga).</li><li><strong>2. 調子に乗る:</strong> Besar kepala / terbawa suasana.</li><li><strong>3. 人当たりがいい:</strong> Ramah / pandai bergaul.</li><li><strong>4. 見栄を張る (みえをはる):</strong> Tepat. Pamer / memaksakan diri demi gengsi.</li></ul>" },
            { id: 16, text: "ここでは<u>都合が悪い</u>から、別の場所で話そう。", options: ["重い", "かたい", "あまい", "まずい"], answer: 3, explanation: "Kata yang bersinonim dengan 都合が悪い (situasinya buruk/tidak nyaman).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 重い:</strong> Berat.</li><li><strong>2. かたい:</strong> Keras.</li><li><strong>3. あまい:</strong> Manis / longgar.</li><li><strong>4. まずい:</strong> Tepat. Selain tidak enak (makanan), まずい juga berarti situasi/kondisi yang buruk atau canggung.</li></ul>" },
            { id: 17, text: "彼は、<u>自分からやめて</u>、後輩に仕事を譲った。", options: ["身を引いて", "話をつけて", "調子を下げて", "筋を通して"], answer: 0, explanation: "Kata yang bersinonim dengan 自分からやめる (mengundurkan diri secara sukarela).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 身を引いて (みをひいて):</strong> Tepat. Menarik diri / mengundurkan diri (untuk memberikan posisi pada orang lain).</li><li><strong>2. 話をつけて:</strong> Mencapai kesepakatan.</li><li><strong>3. 調子を下げて:</strong> Menurunkan nada/kondisi.</li><li><strong>4. 筋を通して:</strong> Bertindak logis / taat pada prinsip.</li></ul>" },
            { id: 18, text: "手品の<u>仕掛け</u>がばれた。", options: ["波", "道", "根", "種"], answer: 3, explanation: "Kata yang bersinonim dengan 仕掛け (rahasia / trik dalam sulap).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 波:</strong> Gelombang.</li><li><strong>2. 道:</strong> Jalan.</li><li><strong>3. 根:</strong> Akar.</li><li><strong>4. 種 (たね):</strong> Tepat. 「手品の種」 (tejina no tane) berarti rahasia atau trik sulap.</li></ul>" },
            { id: 19, text: "わがチームの優勝は<u>間違いない</u>でしょう。", options: ["明るい", "かたい", "強い", "重い"], answer: 1, explanation: "Kata yang bersinonim dengan 間違いない (pasti / tidak diragukan lagi).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 明るい:</strong> Terang.</li><li><strong>2. かたい:</strong> Tepat. Dalam konteks ini berarti solid / pasti / kemungkinannya sangat kuat (優勝がかたい).</li><li><strong>3. 強い:</strong> Kuat (fisik).</li><li><strong>4. 重い:</strong> Berat.</li></ul>" },
            { id: 20, text: "授業料のことを考えると<u>憂うつだ</u>。", options: ["頭が重い", "気が重い", "心にかかる", "思いが強い"], answer: 1, explanation: "Kata yang bersinonim dengan 憂うつだ (depresi / terbebani / malas memikirkannya).<ul class='explanation-list mt-2 mb-0 ps-3'><li><strong>1. 頭が重い:</strong> Pusing/Sakit kepala ringan.</li><li><strong>2. 気が重い (きがおもい):</strong> Tepat. Merasa terbebani / malas atau depresi memikirkan sesuatu (heavy-hearted).</li><li><strong>3. 心にかかる:</strong> Menjadi beban pikiran/khawatir.</li><li><strong>4. 思いが強い:</strong> Perasaannya kuat.</li></ul>" },
            { id: 21, text: "波 (なみ)", options: ["彼は授業の波に乗って、すらすら答えた。", "その会社は不況の波を受けてついに倒産してしまった。", "セールスマンの波に乗らないように気をつけてください。", "台風の被害には波がいろいろある。"], answer: 1, explanation: "Penggunaan yang tepat untuk 波 (gelombang tren/dampak/fluktuasi).<br>Opsi 2 paling tepat: 'Perusahaan itu terkena gelombang (dampak) resesi ekonomi dan akhirnya bangkrut.' <br>Opsi 1 salah (seharusnya 調子にのって). Opsi 3 salah (seharusnya 口車にのらない). Opsi 4 salah (seharusnya 程度がある)." },
            { id: 22, text: "すべる", options: ["コップを手ですべって、落としてしまった。", "つい口がすべってしまい、うそがばれてしまった。", "湖水の上を白鳥がすべるように泳いでいる。", "試験の時間にすべるように、落ち着いてください。"], answer: 1, explanation: "Penggunaan yang tepat untuk すべる (tergelincir / gagal / keceplosan).<br>Opsi 2 paling tepat: 'Karena keceplosan (口がすべる / kuchi ga suberu), kebohonganku ketahuan.' <br>Opsi 1 salah (seharusnya 手がすべって). Opsi 3 salah (kurang pas digunakan untuk angsa berenang). Opsi 4 salah (seharusnya 間に合うように)." },
            { id: 23, text: "通る (とおる)", options: ["彼の主張は、一応、筋が通っている。", "彼は恋人の肩に手を通した。", "車で駅まで通っていきましょう。", "わからなかった問題がやっと通った。"], answer: 0, explanation: "Penggunaan yang tepat untuk 通る (lewat / masuk akal / lulus).<br>Opsi 1 paling tepat: 'Pendapatnya, untuk sementara ini, masuk akal (筋が通っている).' <br>Opsi 2 salah (seharusnya 手を回した - merangkul). Opsi 3 salah (seharusnya 通って/向かって/行って). Opsi 4 salah (seharusnya 解けた/わかった)." },
            { id: 24, text: "飛ぶ (とぶ)", options: ["扇風機で風が飛んで、涼しくなった。", "暑さで氷が一気に飛んでしまった。", "年とともに髪の毛が飛んで、はげてきた。", "ブレーキランプのヒューズが飛んでしまった。"], answer: 3, explanation: "Penggunaan yang tepat untuk 飛ぶ (terbang / hilang seketika / putus).<br>Opsi 4 paling tepat: 'Sekering (fuse) lampu rem putus (飛ぶ / blew).' <br>Opsi 1 salah (seharusnya 風が吹いて). Opsi 2 salah (seharusnya 溶けて - mencair). Opsi 3 salah (seharusnya 抜けて - rontok)." },
            { id: 25, text: "明るい (あかるい)", options: ["彼はとても責任感の明るい人です。", "父は世界の地理に明るい。", "この計算は明るい。", "おじいちゃん、おばあちゃんは孫に明るいものだ。"], answer: 1, explanation: "Penggunaan yang tepat untuk 明るい (terang / berpengetahuan luas / familier).<br>Opsi 2 paling tepat: 'Ayah sangat berpengetahuan luas/paham betul tentang geografi dunia (地理に明るい).' <br>Opsi 1 salah (seharusnya 責任感が強い). Opsi 3 salah (seharusnya 簡単/明白). Opsi 4 salah (seharusnya 甘い - memanjakan)." }
        ];
    </script>

    <script>
        // --- 1. THEME MANAGEMENT ---
        function getSavedTheme() {
            return localStorage.getItem('jlpt_theme') || 'system';
        }

        function setTheme(theme) {
            localStorage.setItem('jlpt_theme', theme);
            
            document.querySelectorAll('.btn-theme').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-theme-${theme}`).classList.add('active');

            if (theme === 'system') {
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-bs-theme', systemPrefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-bs-theme', theme);
            }
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (getSavedTheme() === 'system') setTheme('system');
        });

        setTheme(getSavedTheme());

        // --- 2. STATE MANAGEMENT ---
        let state = JSON.parse(sessionStorage.getItem('jlpt_session_minggu6')) || {
            mode: null,          
            answers: {},         
            timeRemaining: 900,  
            isFinished: false,
            lastClicked: null    
        };
        let timerInterval;

        const saveState = () => sessionStorage.setItem('jlpt_session_minggu6', JSON.stringify(state));

        const resetSession = () => {
            if(confirm("Yakin ingin keluar? Riwayat ujian saat ini akan terhapus.")) {
                state = { mode: null, answers: {}, timeRemaining: 900, isFinished: false, lastClicked: null };
                saveState();
                clearInterval(timerInterval);
                renderHome();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        
        const returnToIndex = () => {
            window.location.href = "../index.html";
        };

        const app = document.getElementById('app');

        // --- 3. RENDERING ENGINE ---
        function renderHome() {
            app.innerHTML = `
                <div class="card card-exam mx-auto" style="max-width: 650px;">
                    <div class="card-body text-center p-4 p-md-5">
                        <div class="mb-4 text-primary">
                            <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary text-white mb-3 shadow" style="width: 80px; height: 80px;">
                                <i class="fas fa-torii-gate fa-2x"></i>
                            </div>
                            <h1 class="display-6 fw-bold mb-1" style="letter-spacing: -1px;">日本語能力試験 <span class="text-dark" data-bs-theme="dark" style="color: inherit;">N1</span></h1>
                        </div>
                        <h5 class="text-secondary mb-4 fw-bold">SOU MATOME - 第6週 意味が多い言葉を覚えよう</h5>
                        <p class="mb-4 text-muted">Silakan pilih mode simulasi. <br class="d-none d-md-block">Uji kemampuan kosakata kata bermakna ganda Anda sekarang.</p>
                        
                        <div class="d-grid gap-3 mb-4">
                            <button onclick="startQuiz('asli')" class="btn btn-outline-primary btn-lg p-3 p-md-4 text-start position-relative shadow-sm rounded-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3 me-md-4 shadow" style="min-width: 50px; height: 50px;">
                                        <i class="fas fa-file-signature fa-lg"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">Mode Ujian Asli (本試験)</h5>
                                        <small style="font-size: 0.85rem;">15 Menit | Bisa perbaiki jawaban | Evaluasi Akhir</small>
                                    </div>
                                </div>
                            </button>
                            <button onclick="startQuiz('latihan')" class="btn btn-outline-success btn-lg p-3 p-md-4 text-start position-relative shadow-sm rounded-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-3 me-md-4 shadow" style="min-width: 50px; height: 50px;">
                                        <i class="fas fa-book-reader fa-lg"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold">Mode Latihan (練習)</h5>
                                        <small style="font-size: 0.85rem;">Santai | Langsung cek benar/salah & penjelasan</small>
                                    </div>
                                </div>
                            </button>
                        </div>
                        
                        <hr class="my-4">
                        <button onclick="returnToIndex()" class="btn btn-light border w-100 fw-bold rounded-pill text-muted">
                            <i class="fas fa-arrow-left me-2"></i> Kembali ke Menu Utama (.index.html)
                        </button>
                    </div>
                </div>
            `;
        }

        function startQuiz(mode) {
            state.mode = mode;
            state.isFinished = false;
            state.lastClicked = null;
            saveState();
            
            if (mode === 'asli' && !timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateTimer() {
            if (state.timeRemaining <= 0) {
                clearInterval(timerInterval);
                alert("Waktu Habis! Ujian otomatis dikumpulkan.");
                finishQuiz();
                return;
            }
            state.timeRemaining--;
            saveState();
            
            const timerEl = document.getElementById('timer-display');
            if (timerEl) {
                const m = Math.floor(state.timeRemaining / 60).toString().padStart(2, '0');
                const s = (state.timeRemaining % 60).toString().padStart(2, '0');
                
                if (state.timeRemaining < 180) { // Kurang dari 3 menit
                    timerEl.classList.remove('bg-primary');
                    timerEl.classList.add('timer-warning');
                }
                timerEl.innerHTML = `<i class="fas fa-stopwatch me-1"></i> ${m}:${s}`;
            }
        }

        window.selectOption = function(qId, optIndex) {
            if (state.isFinished) return;
            
            const isCorrect = hari6_data.find(q => q.id === qId).answer === optIndex;
            
            state.answers[qId] = optIndex;
            state.lastClicked = { qId, optIndex, isCorrect }; 
            
            saveState();
            renderQuiz();
        };

        function renderQuiz() {
            if (state.isFinished) return renderResult();

            let scoreLatihan = calculateScore();
            let totalAnswered = Object.keys(state.answers).length;
            let progress = (totalAnswered / hari6_data.length) * 100;

            let html = `
                <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4 sticky-top bg-body pt-3 pb-2 z-3" style="margin-top:-20px;">
                    <button onclick="resetSession()" class="btn btn-outline-secondary rounded-pill shadow-sm">
                        <i class="fas fa-times me-1"></i> Batal
                    </button>
                    ${state.mode === 'asli' 
                        ? `<span class="badge bg-primary fs-5 shadow px-3 py-2 rounded-pill" id="timer-display">
                            <i class="fas fa-stopwatch me-1"></i> ${Math.floor(state.timeRemaining / 60).toString().padStart(2, '0')}:${(state.timeRemaining % 60).toString().padStart(2, '0')}
                           </span>`
                        : `<span class="badge bg-success fs-5 shadow px-3 py-2 rounded-pill"><i class="fas fa-star me-1 text-warning"></i> Skor: ${scoreLatihan.total}</span>`
                    }
                </div>

                <div class="card card-exam mb-4 border-0">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-3 ${state.mode === 'asli' ? 'text-primary' : 'text-success'}">
                            <i class="${state.mode === 'asli' ? 'fas fa-pen-nib' : 'fas fa-dumbbell'} me-2"></i>
                            ${state.mode === 'asli' ? '本試験 (Ujian Asli) - 第6週' : '練習 (Mode Latihan) - 第6週'}
                        </h4>
                        <div class="progress" style="height: 12px; border-radius: 10px; background-color: var(--bs-secondary-bg);">
                            <div class="progress-bar progress-bar-striped progress-bar-animated ${state.mode === 'asli' ? 'bg-primary' : 'bg-success'}" 
                                 style="width: ${progress}%"></div>
                        </div>
                        <div class="text-end mt-2 fw-bold text-muted small">${totalAnswered} / ${hari6_data.length} Terjawab</div>
                    </div>
                </div>
            `;

            hari6_data.forEach((q, index) => {
                const userAnswer = state.answers[q.id];
                html += `
                    <div class="card card-exam mb-4" id="q${q.id}">
                        <div class="card-body p-3 p-md-4">
                            <div class="d-flex align-items-start mb-4">
                                <span class="badge badge-soal rounded-pill me-3 shadow-sm py-2 px-3">${index + 1}</span> 
                                <span class="soal-text lh-base">${q.text}</span>
                            </div>
                            <div class="row g-3 ms-md-4">
                `;

                q.options.forEach((opt, oIndex) => {
                    let btnClass = '';
                    let animateClass = '';
                    
                    if (state.mode === 'asli') {
                        if (userAnswer === oIndex) btnClass = 'btn-selected'; 
                    } else if (state.mode === 'latihan') {
                        if (userAnswer === oIndex) {
                            btnClass = (oIndex === q.answer) ? 'btn-success text-white' : 'btn-danger text-white';
                        } else if (userAnswer !== undefined && oIndex === q.answer) {
                            btnClass = 'border-success text-success fw-bold bg-success bg-opacity-10';
                        }
                    }

                    if (state.lastClicked && state.lastClicked.qId === q.id && state.lastClicked.optIndex === oIndex && state.mode === 'latihan') {
                        animateClass = state.lastClicked.isCorrect ? 'animate-correct' : 'animate-wrong';
                    }

                    html += `
                        <div class="col-12 col-md-6 d-grid">
                            <button onclick="selectOption(${q.id}, ${oIndex})" 
                                    class="btn btn-option border p-3 d-flex align-items-center ${btnClass} ${animateClass}">
                                <span class="opt-number shadow-sm">${oIndex + 1}</span>
                                <span>${opt}</span>
                            </button>
                        </div>
                    `;
                });

                if (state.mode === 'latihan' && userAnswer !== undefined) {
                    const isCorrect = userAnswer === q.answer;
                    html += `
                        <div class="col-12 mt-4 ms-md-4 w-auto">
                            <div class="p-3 explanation-box shadow-sm">
                                <h6 class="${isCorrect ? 'text-success' : 'text-danger'} fw-bold mb-2">
                                    <i class="${isCorrect ? 'fas fa-check-circle' : 'fas fa-times-circle'} me-1"></i>
                                    ${isCorrect ? 'Jawaban Tepat!' : 'Jawaban Kurang Tepat.'}
                                </h6>
                                <div class="small lh-lg">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `</div></div></div>`;
            });

            html += `
                <div class="text-center mt-5 mb-5 pb-5">
                    <button onclick="confirmFinish()" class="btn btn-primary btn-lg px-5 py-3 rounded-pill shadow fw-bold fs-5">
                        <i class="fas fa-paper-plane me-2"></i> Kumpulkan Ujian
                    </button>
                </div>
            `;

            app.innerHTML = html;
        }

        function calculateScore() {
            let correct = 0, wrong = 0;
            for (let qId in state.answers) {
                const q = hari6_data.find(x => x.id == qId);
                if (state.answers[qId] === q.answer) correct++;
                else wrong++;
            }
            return { correct, wrong, total: correct - wrong }; 
        }

        window.confirmFinish = function() {
            const answered = Object.keys(state.answers).length;
            if (answered < hari6_data.length) {
                if(!confirm(`Ada soal yang belum dijawab (${answered}/${hari6_data.length}). Yakin ingin mengumpulkan sekarang?`)) {
                    return;
                }
            } else {
                if(!confirm("Kumpulkan dan lihat hasil akhir?")) return;
            }
            finishQuiz();
        };

        window.finishQuiz = function() {
            state.isFinished = true;
            clearInterval(timerInterval);
            saveState();
            renderResult();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function renderResult() {
            const result = calculateScore();
            const answeredCount = Object.keys(state.answers).length;
            const unanswered = hari6_data.length - answeredCount;
            
            let grade = '不合格 (F)';
            let gradeColor = 'text-danger';
            let icon = 'fa-times-circle';
            
            if (result.total >= 20) { grade = '秀 (A+)'; gradeColor = 'text-success'; icon = 'fa-crown text-warning'; }
            else if (result.total >= 15) { grade = '優 (A)'; gradeColor = 'text-primary'; icon = 'fa-medal text-primary'; }
            else if (result.total >= 10) { grade = '良 (B)'; gradeColor = 'text-info'; icon = 'fa-thumbs-up text-info'; }
            else if (result.total >= 5) { grade = '可 (C)'; gradeColor = 'text-warning'; icon = 'fa-check text-warning'; }
            else if (result.total >= 0) { grade = '不可 (D)'; gradeColor = 'text-danger'; icon = 'fa-exclamation-triangle text-danger'; }

            let html = `
                <div class="card card-exam border-0 mb-5 text-center overflow-hidden">
                    <div class="bg-primary text-white py-4 shadow-sm">
                        <h2 class="fw-bold m-0"><i class="fas fa-poll me-2"></i> Hasil Simulasi N1 - 第6週</h2>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <i class="fas ${icon} fa-5x mb-3 drop-shadow"></i>
                        <h1 class="display-3 fw-bold mb-1 ${gradeColor}">${grade}</h1>
                        <h4 class="mb-4 text-muted fw-bold">Skor Anda: <span class="${gradeColor}">${result.total}</span> / 25</h4>
                        
                        <div class="row justify-content-center mb-5 g-3">
                            <div class="col-4 col-md-3">
                                <div class="bg-success text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-check-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Benar</h6>
                                    <h3 class="m-0 fw-bold">${result.correct}</h3>
                                </div>
                            </div>
                            <div class="col-4 col-md-3">
                                <div class="bg-danger text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-times-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Salah</h6>
                                    <h3 class="m-0 fw-bold">${result.wrong}</h3>
                                </div>
                            </div>
                            <div class="col-4 col-md-3">
                                <div class="bg-secondary text-white p-3 rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center">
                                    <i class="fas fa-minus-circle fa-2x mb-2 opacity-75"></i>
                                    <h6 class="mb-1">Kosong</h6>
                                    <h3 class="m-0 fw-bold">${unanswered}</h3>
                                </div>
                            </div>
                        </div>

                        <button onclick="resetSession()" class="btn btn-outline-primary btn-lg px-5 rounded-pill shadow-sm fw-bold">
                            <i class="fas fa-redo-alt me-2"></i> Ulangi Simulasi
                        </button>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4 border-bottom border-primary border-2 pb-2">
                    <i class="fas fa-list-check fa-2x me-3 text-primary"></i>
                    <h3 class="fw-bold m-0 text-primary">Evaluasi Detail</h3>
                </div>
            `;

            hari6_data.forEach((q, index) => {
                const userAnswer = state.answers[q.id];
                const isCorrect = userAnswer === q.answer;
                const isUnanswered = userAnswer === undefined;
                
                let borderClass = isUnanswered ? 'border-secondary' : (isCorrect ? 'border-success' : 'border-danger');
                let badgeStatus = isUnanswered 
                    ? '<span class="badge bg-secondary rounded-pill px-3"><i class="fas fa-minus me-1"></i> Kosong</span>' 
                    : (isCorrect ? '<span class="badge bg-success rounded-pill px-3"><i class="fas fa-check me-1"></i> Benar</span>' : '<span class="badge bg-danger rounded-pill px-3"><i class="fas fa-times me-1"></i> Salah</span>');

                html += `
                    <div class="card card-exam mb-4 shadow-sm border-0" style="border-left: 6px solid ${isUnanswered ? '#6c757d' : (isCorrect ? '#198754' : '#dc3545')} !important; border-top: none;">
                        <div class="card-body p-4">
                            <h5 class="mb-3 lh-base">
                                ${badgeStatus} <span class="ms-2 fw-bold text-muted">No. ${index + 1}</span>
                            </h5>
                            <h5 class="fw-bold mb-4">${q.text}</h5>
                            
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="p-3 rounded-4 bg-light text-dark h-100 ${!isUnanswered && !isCorrect ? 'border border-danger border-2' : 'border border-light'}">
                                        <small class="text-muted d-block mb-2 fw-bold"><i class="fas fa-user-edit me-1"></i> Jawaban Anda:</small>
                                        <strong class="${isCorrect ? 'text-success' : (!isUnanswered ? 'text-danger' : 'text-muted')} fs-6">
                                            ${isUnanswered ? '<em>Tidak dijawab</em>' : (userAnswer + 1) + '. ' + q.options[userAnswer]}
                                        </strong>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="p-3 rounded-4 bg-light text-dark h-100 border border-success border-2" style="background-color: rgba(25,135,84,0.05) !important;">
                                        <small class="text-success d-block mb-2 fw-bold"><i class="fas fa-key me-1"></i> Kunci Jawaban:</small>
                                        <strong class="text-success fs-6">
                                            ${(q.answer + 1)}. ${q.options[q.answer]}
                                        </strong>
                                    </div>
                                </div>
                            </div>
                            <div class="explanation-box p-3 rounded-3">
                                <span class="badge bg-primary mb-2">解説 (Penjelasan)</span>
                                <div class="lh-lg small">${q.explanation}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `<div class="mb-5 pb-5"></div>`;
            app.innerHTML = html;
        }

        // --- 4. INIT ---
        if (state.mode && !state.isFinished) {
            if (state.mode === 'asli' && !timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
            renderQuiz();
        } else if (state.isFinished) {
            renderResult();
        } else {
            renderHome();
        }
    </script>
</body>
</html>
