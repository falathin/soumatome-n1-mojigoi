        } else {
          document.documentElement.setAttribute(
            'data-bs-theme',
            theme === 'auto' ? 'light' : theme

          const matchSearch =
            item.ja.toLowerCase().includes(searchQuery) ||
            item.idn.toLowerCase().includes(searchQuery) ||
            item.id === searchQuery
          const matchStatus =
            currentStatus === 'all' || hafalanState[item.id] == currentStatus
          return matchCat && matchSearch && matchStatus
        })

        if (filteredData.length === 0) {
          emptyState.classList.remove('d-none')
        } else {
          emptyState.classList.add('d-none')

          filteredData.forEach((item, index) => {
            const status = hafalanState[item.id]
            let headerColor =
              status === 2
                ? 'bg-info'
                : status === 1
                ? 'bg-warning text-dark'
                : 'bg-success text-white'

            let exHtml = ''
            item.ex.forEach((ex, idx) => {
              exHtml += `
                            <div class="mb-2 p-2 bg-success-subtle rounded-3 border border-success-subtle small">
                                <div class="d-flex">
                                    <span class="badge bg-success me-2 mt-1 px-1">${
                                      idx + 1
                                    }</span>
                                    <div>
                                        <div class="fw-bold text-dark">${
                                          ex.j
                                        }</div>
                                        <div class="text-muted"><i class="bi bi-translate me-1"></i>${
                                          ex.i
                                        }</div>
                                    </div>
                                </div>
                            </div>
                        `
            })

            const cardHtml = `
                        <div class="col" data-aos="fade-up" data-aos-delay="${
                          (index % 3) * 50
                        }">
                            <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden d-flex flex-column">
                                <div id="card-header-${
                                  item.id
                                }" class="card-header py-3 ${headerColor} transition-colors">
                                    <h5 class="card-title mb-0 fw-bold d-flex align-items-center">
                                        <span class="badge bg-light text-dark me-2">#${
                                          item.id
                                        }</span>
                                        ${item.ja}
                                    </h5>
                                </div>
                                <div class="card-body flex-grow-1">
                                    <h6 class="text-primary-emphasis fw-bold mb-3 border-bottom pb-2">
                                        <i class="bi bi-lightbulb-fill text-warning me-1"></i> ${
                                          item.idn
                                        }
                                    </h6>
                                    ${exHtml}
                                </div>
                                <div class="card-footer bg-transparent border-top-0 pb-3 pt-0">
                                    <div class="btn-group w-100 shadow-sm" role="group">
                                        <button id="btn-belum-${
                                          item.id
                                        }" class="btn btn-sm btn-status ${
              status === 0 ? 'btn-danger' : 'btn-outline-danger'
            }" onclick="updateStatus('${
              item.id
            }', 0)"><i class="bi bi-x-circle me-1"></i>Belum</button>
                                        <button id="btn-agak-${
                                          item.id
                                        }" class="btn btn-sm btn-status ${
              status === 1 ? 'btn-warning text-dark' : 'btn-outline-warning'
            }" onclick="updateStatus('${
              item.id
            }', 1)"><i class="bi bi-exclamation-triangle me-1"></i>Agak</button>
                                        <button id="btn-hafal-${
                                          item.id
                                        }" class="btn btn-sm btn-status ${
              status === 2 ? 'btn-info text-white' : 'btn-outline-info'
            }" onclick="updateStatus('${
              item.id
            }', 2)"><i class="bi bi-check-circle me-1"></i>Hafal</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
            container.insertAdjacentHTML('beforeend', cardHtml)
          })
        }
        AOS.refresh()
      }

      // INIT
      document.addEventListener('DOMContentLoaded', () => {
        AOS.init({ duration: 600, once: true, offset: 30 })
        renderTabs()
        setCategory('all')
        updateProgress()
      })
    </script>
  </body>
</html>
